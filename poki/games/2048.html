<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>2048 - PlayHub</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#1a1b2e;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh}.top-bar{width:100%;padding:12px 24px;display:flex;align-items:center;gap:16px;background:#12132a;border-bottom:1px solid rgba(255,255,255,.06)}.back-btn{padding:6px 16px;border-radius:20px;background:rgba(124,92,252,.2);color:#a78bfa;font-size:.85rem;text-decoration:none}.game-title{font-size:1.1rem;font-weight:700}.container{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:16px}.info{display:flex;gap:20px;font-size:.9rem}.info b{color:#eab308}.board{display:grid;grid-template-columns:repeat(4,80px);gap:8px;background:#252748;padding:12px;border-radius:12px}.tile{width:80px;height:80px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.5rem;transition:all .1s}.hint{font-size:.75rem;opacity:.4}button.restart{padding:8px 20px;border-radius:16px;background:rgba(255,255,255,.08);font-size:.85rem;border:1px solid rgba(255,255,255,.1);color:#fff;cursor:pointer}button.restart:hover{background:rgba(255,255,255,.15)}</style></head><body>
<div class="top-bar"><a class="back-btn" href="../index.html">← 返回</a><span class="game-title">🔢 2048</span></div>
<div class="container">
<div class="info"><div>得分：<b id="score">0</b></div><div>最高：<b id="best">0</b></div></div>
<div id="board" class="board"></div>
<button class="restart" onclick="init()">重新开始</button>
<div class="hint">方向键 / WASD / 滑动移动</div>
</div>
<script>
const SIZE=4;
const TILE_COLORS={0:'#1f2937',2:'#e5e7eb',4:'#fde68a',8:'#fdba74',16:'#fb923c',32:'#f87171',64:'#ef4444',128:'#fbbf24',256:'#facc15',512:'#eab308',1024:'#a3e635',2048:'#22c55e'};
const TILE_TEXT={0:'',2:'#1f2937',4:'#1f2937',8:'#fff',16:'#fff',32:'#fff',64:'#fff',128:'#fff',256:'#fff',512:'#fff',1024:'#fff',2048:'#fff'};
let grid,score,best=+localStorage.getItem('2048_best')||0,moved;
document.getElementById('best').textContent=best;

function init(){
  grid=Array.from({length:SIZE},()=>Array(SIZE).fill(0));
  score=0;document.getElementById('score').textContent=0;
  addRandom();addRandom();render();
}
function addRandom(){
  const empty=[];
  for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++)if(!grid[r][c])empty.push([r,c]);
  if(!empty.length)return;
  const[r,c]=empty[Math.floor(Math.random()*empty.length)];
  grid[r][c]=Math.random()<0.9?2:4;
}
function slide(row){
  let arr=row.filter(v=>v);moved=moved||arr.length!==row.filter(v=>v).length;
  for(let i=0;i<arr.length-1;i++){
    if(arr[i]===arr[i+1]){arr[i]*=2;score+=arr[i];arr.splice(i+1,1);moved=true}
  }
  while(arr.length<SIZE)arr.push(0);
  for(let i=0;i<SIZE;i++){if(row[i]!==arr[i])moved=true}
  return arr;
}
function move(dir){
  moved=false;
  if(dir==='left')for(let r=0;r<SIZE;r++)grid[r]=slide(grid[r]);
  else if(dir==='right')for(let r=0;r<SIZE;r++)grid[r]=slide(grid[r].reverse()).reverse();
  else if(dir==='up'){for(let c=0;c<SIZE;c++){let col=grid.map(r=>r[c]);col=slide(col);for(let r=0;r<SIZE;r++)grid[r][c]=col[r]}}
  else if(dir==='down'){for(let c=0;c<SIZE;c++){let col=grid.map(r=>r[c]).reverse();col=slide(col).reverse();for(let r=0;r<SIZE;r++)grid[r][c]=col[r]}}
  if(moved){addRandom();document.getElementById('score').textContent=score;if(score>best){best=score;localStorage.setItem('2048_best',best);document.getElementById('best').textContent=best}render();checkGameOver()}
}
function checkGameOver(){
  for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){
    if(!grid[r][c])return;
    if(c+1<SIZE&&grid[r][c]===grid[r][c+1])return;
    if(r+1<SIZE&&grid[r][c]===grid[r+1][c])return;
  }
  setTimeout(()=>{const board=document.getElementById('board');const ov=document.createElement('div');ov.style.cssText='position:absolute;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;border-radius:12px;font-size:1.3rem;font-weight:700';ov.textContent='游戏结束！';board.style.position='relative';board.appendChild(ov)},100);
}
function render(){
  const board=document.getElementById('board');board.innerHTML='';
  for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){
    const t=document.createElement('div');t.className='tile';
    const v=grid[r][c];
    t.style.background=TILE_COLORS[v]||'#22c55e';
    t.style.color=TILE_TEXT[v]||'#fff';
    t.style.fontSize=v>=1024?'1.1rem':v>=128?'1.3rem':'1.5rem';
    t.textContent=v||'';board.appendChild(t);
  }
}
document.addEventListener('keydown',e=>{
  switch(e.key){case'ArrowLeft':case'a':case'A':e.preventDefault();move('left');break;case'ArrowRight':case'd':case'D':e.preventDefault();move('right');break;case'ArrowUp':case'w':case'W':e.preventDefault();move('up');break;case'ArrowDown':case's':case'S':e.preventDefault();move('down');break}
});
let tx,ty;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY});
document.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;if(Math.abs(dx)<20&&Math.abs(dy)<20)return;if(Math.abs(dx)>Math.abs(dy))move(dx>0?'right':'left');else move(dy>0?'down':'up')});
init();
</script></body></html>

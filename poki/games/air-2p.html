<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>双人空战 - PlayHub</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#1a1b2e;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh}.top-bar{width:100%;padding:12px 24px;display:flex;align-items:center;gap:16px;background:#12132a;border-bottom:1px solid rgba(255,255,255,.06)}.back-btn{padding:6px 16px;border-radius:20px;background:rgba(124,92,252,.2);color:#a78bfa;font-size:.85rem;text-decoration:none}.game-title{font-size:1.1rem;font-weight:700}.container{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:12px}canvas{border-radius:8px;background:#0a1628;box-shadow:0 0 30px rgba(14,165,233,.1)}.hint{font-size:.75rem;opacity:.4}</style></head><body>
<div class="top-bar"><a class="back-btn" href="../index.html">← 返回</a><span class="game-title">✈️ 双人空战</span></div>
<div class="container">
<canvas id="game" width="600" height="400"></canvas>
<div class="hint">P1: WASD+空格射击 · P2: 方向键+Enter射击 · 先得5分胜</div>
</div>
<script>
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
const W=600,H=400,keys={};
let p1,p2,bullets,stars,gameOver,winner;

function init(){
  p1={x:80,y:H/2,vy:0,color:'#22c55e',score:0,cooldown:0};
  p2={x:W-80,y:H/2,vy:0,color:'#0ea5e9',score:0,cooldown:0};
  bullets=[];gameOver=false;winner=null;
  stars=Array.from({length:40},()=>({x:Math.random()*W,y:Math.random()*H,s:Math.random()*1.5+0.5}));
}
document.addEventListener('keydown',e=>{keys[e.key]=true;if([' ','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Enter'].includes(e.key))e.preventDefault()});
document.addEventListener('keyup',e=>{keys[e.key]=false});

function updatePlane(p,up,down,fire,dir){
  if(keys[up])p.vy=Math.max(p.vy-0.3,-4);
  if(keys[down])p.vy=Math.min(p.vy+0.3,4);
  p.vy*=0.95;p.y+=p.vy;
  p.y=Math.max(15,Math.min(H-15,p.y));
  if(keys[fire]&&p.cooldown<=0){bullets.push({x:p.x+dir*15,y:p.y,vx:dir*7,owner:p,color:p.color});p.cooldown=12}
  if(p.cooldown>0)p.cooldown--;
}
function update(){
  if(gameOver)return;
  updatePlane(p1,'w','s',' ',1);
  updatePlane(p2,'ArrowUp','ArrowDown','Enter',-1);
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];b.x+=b.vx;
    if(b.x<0||b.x>W){bullets.splice(i,1);continue}
    const target=b.owner===p1?p2:p1;
    if(Math.abs(b.x-target.x)<18&&Math.abs(b.y-target.y)<14){
      b.owner.score++;bullets.splice(i,1);
      target.y=H/2;target.vy=0;
      if(b.owner.score>=5){gameOver=true;winner=b.owner===p1?'P1 🟢':'P2 🔵'}
    }
  }
  stars.forEach(s=>{s.x-=s.s*0.3;if(s.x<0)s.x=W});
}
function drawPlane(p,dir){
  ctx.fillStyle=p.color;
  ctx.beginPath();ctx.moveTo(p.x+dir*18,p.y);ctx.lineTo(p.x-dir*10,p.y-12);ctx.lineTo(p.x-dir*6,p.y);ctx.lineTo(p.x-dir*10,p.y+12);ctx.closePath();ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.3)';ctx.beginPath();ctx.moveTo(p.x+dir*18,p.y);ctx.lineTo(p.x+dir*5,p.y-5);ctx.lineTo(p.x+dir*5,p.y+5);ctx.closePath();ctx.fill();
}
function draw(){
  ctx.clearRect(0,0,W,H);
  stars.forEach(s=>{ctx.fillStyle=`rgba(255,255,255,${s.s/2})`;ctx.fillRect(s.x,s.y,s.s,s.s)});
  drawPlane(p1,1);drawPlane(p2,-1);
  bullets.forEach(b=>{ctx.fillStyle=b.color;ctx.fillRect(b.x-4,b.y-1.5,8,3)});
  ctx.fillStyle=p1.color;ctx.font='bold 16px sans-serif';ctx.textAlign='left';ctx.fillText(`P1: ${p1.score}`,15,25);
  ctx.fillStyle=p2.color;ctx.textAlign='right';ctx.fillText(`P2: ${p2.score}`,W-15,25);
  if(gameOver){ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillRect(0,0,W,H);ctx.fillStyle='#fff';ctx.font='bold 28px sans-serif';ctx.textAlign='center';ctx.fillText(winner+' 获胜！',W/2,H/2-10);ctx.font='14px sans-serif';ctx.fillStyle='rgba(255,255,255,.5)';ctx.fillText('点击重新开始',W/2,H/2+25);canvas.onclick=()=>{canvas.onclick=null;init()}}
}
function loop(){update();draw();requestAnimationFrame(loop)}
init();loop();
</script></body></html>

<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>弹力球 - PlayHub</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#1a1b2e;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh}.top-bar{width:100%;padding:12px 24px;display:flex;align-items:center;gap:16px;background:#12132a;border-bottom:1px solid rgba(255,255,255,.06)}.back-btn{padding:6px 16px;border-radius:20px;background:rgba(124,92,252,.2);color:#a78bfa;font-size:.85rem;text-decoration:none}.game-title{font-size:1.1rem;font-weight:700}.container{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:12px}canvas{border-radius:8px;background:#1a0f05;box-shadow:0 0 30px rgba(249,115,22,.1);cursor:pointer}.hint{font-size:.75rem;opacity:.4}</style></head><body>
<div class="top-bar"><a class="back-btn" href="../index.html">← 返回</a><span class="game-title">🏀 弹力球</span></div>
<div class="container">
<canvas id="game" width="400" height="500"></canvas>
<div class="hint">点击添加弹力球 · 看它们自由弹跳碰撞 · 滑动屏幕甩球</div>
</div>
<script>
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
const W=400,H=500,G=0.3;
let balls=[],mouse={x:0,y:0,px:0,py:0};
const COLORS=['#f97316','#ef4444','#eab308','#22c55e','#3b82f6','#a855f7','#ec4899','#14b8a6'];

function addBall(x,y,vx=0,vy=0){
  const r=12+Math.random()*18;
  balls.push({x,y,vx:vx+(Math.random()-.5)*2,vy:vy-2,r,color:COLORS[Math.floor(Math.random()*COLORS.length)],trail:[]});
  if(balls.length>30)balls.shift();
}
canvas.addEventListener('click',e=>{
  const rect=canvas.getBoundingClientRect();
  const x=(e.clientX-rect.left)*(W/rect.width),y=(e.clientY-rect.top)*(H/rect.height);
  const vx=(x-mouse.px)*0.3,vy=(y-mouse.py)*0.3;
  addBall(x,y,vx,vy);
});
canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect();
  mouse.px=mouse.x;mouse.py=mouse.y;
  mouse.x=(e.clientX-rect.left)*(W/rect.width);mouse.y=(e.clientY-rect.top)*(H/rect.height);
});

function update(){
  for(const b of balls){
    b.vy+=G;b.x+=b.vx;b.y+=b.vy;
    b.trail.push({x:b.x,y:b.y});if(b.trail.length>10)b.trail.shift();
    // walls
    if(b.x-b.r<0){b.x=b.r;b.vx=Math.abs(b.vx)*0.9}
    if(b.x+b.r>W){b.x=W-b.r;b.vx=-Math.abs(b.vx)*0.9}
    if(b.y+b.r>H){b.y=H-b.r;b.vy=-Math.abs(b.vy)*0.85;b.vx*=0.98}
    if(b.y-b.r<0){b.y=b.r;b.vy=Math.abs(b.vy)*0.9}
  }
  // ball-ball collision
  for(let i=0;i<balls.length;i++){
    for(let j=i+1;j<balls.length;j++){
      const a=balls[i],b=balls[j];
      const dx=b.x-a.x,dy=b.y-a.y,dist=Math.sqrt(dx*dx+dy*dy),minD=a.r+b.r;
      if(dist<minD&&dist>0){
        const nx=dx/dist,ny=dy/dist,overlap=(minD-dist)/2;
        a.x-=nx*overlap;a.y-=ny*overlap;b.x+=nx*overlap;b.y+=ny*overlap;
        const dvx=a.vx-b.vx,dvy=a.vy-b.vy,dvn=dvx*nx+dvy*ny;
        if(dvn>0){
          const ma=a.r*a.r,mb=b.r*b.r,total=ma+mb;
          a.vx-=dvn*nx*mb/total*1.8;a.vy-=dvn*ny*mb/total*1.8;
          b.vx+=dvn*nx*ma/total*1.8;b.vy+=dvn*ny*ma/total*1.8;
        }
      }
    }
  }
}
function draw(){
  ctx.clearRect(0,0,W,H);
  // bg gradient
  const bg=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,W);
  bg.addColorStop(0,'#1f1208');bg.addColorStop(1,'#0a0502');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  balls.forEach(b=>{
    // trail
    b.trail.forEach((t,i)=>{
      ctx.globalAlpha=(i/b.trail.length)*0.15;ctx.fillStyle=b.color;
      ctx.beginPath();ctx.arc(t.x,t.y,b.r*0.5,0,Math.PI*2);ctx.fill();
    });
    ctx.globalAlpha=1;
    // shadow
    ctx.fillStyle='rgba(0,0,0,.2)';ctx.beginPath();ctx.ellipse(b.x,H-5,b.r*0.7,4,0,0,Math.PI*2);ctx.fill();
    // ball
    const grad=ctx.createRadialGradient(b.x-b.r*0.3,b.y-b.r*0.3,b.r*0.1,b.x,b.y,b.r);
    grad.addColorStop(0,'rgba(255,255,255,.3)');grad.addColorStop(0.5,b.color);grad.addColorStop(1,b.color);
    ctx.fillStyle=grad;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();
    // highlight
    ctx.fillStyle='rgba(255,255,255,.25)';ctx.beginPath();ctx.arc(b.x-b.r*0.25,b.y-b.r*0.25,b.r*0.3,0,Math.PI*2);ctx.fill();
  });
  // count
  ctx.fillStyle='rgba(255,255,255,.3)';ctx.font='12px sans-serif';ctx.textAlign='right';ctx.fillText('球数: '+balls.length,W-10,20);
}
function loop(){update();draw();requestAnimationFrame(loop)}
// start with a few balls
for(let i=0;i<5;i++)addBall(80+Math.random()*(W-160),100+Math.random()*200);
loop();
</script></body></html>

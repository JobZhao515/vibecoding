<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>打砖块 - PlayHub</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#1a1b2e;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh}.top-bar{width:100%;padding:12px 24px;display:flex;align-items:center;gap:16px;background:#12132a;border-bottom:1px solid rgba(255,255,255,.06)}.back-btn{padding:6px 16px;border-radius:20px;background:rgba(124,92,252,.2);color:#a78bfa;font-size:.85rem;text-decoration:none}.game-title{font-size:1.1rem;font-weight:700}.container{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:12px}canvas{border-radius:8px;background:#0a0a1a;box-shadow:0 0 30px rgba(139,92,246,.1)}.info{display:flex;gap:20px;font-size:.9rem}.info b{color:#8b5cf6}.hint{font-size:.75rem;opacity:.4}</style></head><body>
<div class="top-bar"><a class="back-btn" href="../index.html">← 返回</a><span class="game-title">🧱 打砖块</span></div>
<div class="container">
<div class="info"><div>得分：<b id="score">0</b></div><div>生命：<b id="lives">3</b></div></div>
<canvas id="game" width="480" height="400"></canvas>
<div class="hint">鼠标 / 触摸移动挡板</div>
</div>
<script>
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
const W=480,H=400;
const ROWS=5,COLS=10,BW=W/COLS-4,BH=18,BPAD=4,BTOP=40;
const COLORS=['#ef4444','#f97316','#eab308','#22c55e','#3b82f6'];
let paddle,ball,bricks,score,lives,running;
function init(){
  paddle={x:W/2-40,y:H-25,w:80,h:10};
  ball={x:W/2,y:H-40,r:6,vx:3,vy:-3};
  bricks=[];score=0;lives=3;running=true;
  document.getElementById('score').textContent=0;document.getElementById('lives').textContent=3;
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)bricks.push({x:c*(BW+BPAD)+BPAD/2+2,y:r*(BH+BPAD)+BTOP,w:BW,h:BH,color:COLORS[r],alive:true});
}
function update(){
  if(!running)return;
  ball.x+=ball.vx;ball.y+=ball.vy;
  if(ball.x-ball.r<0||ball.x+ball.r>W)ball.vx*=-1;
  if(ball.y-ball.r<0)ball.vy*=-1;
  if(ball.y+ball.r>H){lives--;document.getElementById('lives').textContent=lives;if(lives<=0){running=false;return}ball.x=paddle.x+paddle.w/2;ball.y=H-40;ball.vx=3*(Math.random()>.5?1:-1);ball.vy=-3}
  // paddle
  if(ball.vy>0&&ball.y+ball.r>=paddle.y&&ball.x>=paddle.x&&ball.x<=paddle.x+paddle.w){
    ball.vy=-Math.abs(ball.vy)*1.02;ball.vx+=((ball.x-(paddle.x+paddle.w/2))/paddle.w)*4;
    const spd=Math.sqrt(ball.vx*ball.vx+ball.vy*ball.vy);if(spd>8){ball.vx*=8/spd;ball.vy*=8/spd}
  }
  // bricks
  for(const b of bricks){
    if(!b.alive)continue;
    if(ball.x+ball.r>b.x&&ball.x-ball.r<b.x+b.w&&ball.y+ball.r>b.y&&ball.y-ball.r<b.y+b.h){
      b.alive=false;ball.vy*=-1;score+=10;document.getElementById('score').textContent=score;
    }
  }
  if(bricks.every(b=>!b.alive))init();
}
function draw(){
  ctx.clearRect(0,0,W,H);
  bricks.forEach(b=>{if(!b.alive)return;ctx.fillStyle=b.color;ctx.beginPath();ctx.roundRect(b.x,b.y,b.w,b.h,3);ctx.fill();ctx.fillStyle='rgba(255,255,255,.2)';ctx.fillRect(b.x,b.y,b.w,3)});
  ctx.fillStyle='#8b5cf6';ctx.beginPath();ctx.roundRect(paddle.x,paddle.y,paddle.w,paddle.h,5);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);ctx.fill();
  if(!running){ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillRect(0,0,W,H);ctx.fillStyle='#fff';ctx.font='bold 24px sans-serif';ctx.textAlign='center';ctx.fillText('游戏结束 - '+score+'分',W/2,H/2-10);ctx.font='14px sans-serif';ctx.fillStyle='rgba(255,255,255,.5)';ctx.fillText('点击重新开始',W/2,H/2+20);canvas.onclick=()=>{canvas.onclick=null;init()}}
}
canvas.addEventListener('mousemove',e=>{const r=canvas.getBoundingClientRect();paddle.x=Math.max(0,Math.min(W-paddle.w,(e.clientX-r.left)*(W/r.width)-paddle.w/2))});
canvas.addEventListener('touchmove',e=>{e.preventDefault();const r=canvas.getBoundingClientRect();paddle.x=Math.max(0,Math.min(W-paddle.w,(e.touches[0].clientX-r.left)*(W/r.width)-paddle.w/2))},{passive:false});
function loop(){update();draw();requestAnimationFrame(loop)}
init();loop();
</script></body></html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>画线救人 - PlayHub</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1b2e;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh}
.top-bar{width:100%;padding:12px 24px;display:flex;align-items:center;gap:16px;background:#12132a;border-bottom:1px solid rgba(255,255,255,.06)}
.back-btn{padding:6px 16px;border-radius:20px;background:rgba(124,92,252,.2);color:#a78bfa;font-size:.85rem;text-decoration:none}
.back-btn:hover{background:rgba(124,92,252,.4)}
.game-title{font-size:1.1rem;font-weight:700}
.container{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:12px}
.info-bar{display:flex;gap:20px;font-size:.9rem}
.info-bar span{opacity:.5}
.info-bar b{color:#a855f7}
canvas{border-radius:8px;background:#0f0a1a;box-shadow:0 0 40px rgba(168,85,247,.12);cursor:crosshair}
.btns{display:flex;gap:8px}
.btns button{padding:8px 20px;border-radius:16px;background:rgba(255,255,255,.08);font-size:.85rem;border:1px solid rgba(255,255,255,.1)}
.btns button:hover{background:rgba(255,255,255,.15)}
.hint{font-size:.75rem;opacity:.4}
</style>
</head>
<body>
<div class="top-bar">
  <a class="back-btn" href="../index.html">← 返回</a>
  <span class="game-title">✏️ 画线救人</span>
</div>
<div class="container">
  <div class="info-bar">
    <div><span>关卡：</span><b id="levelNum">1</b></div>
    <div><span>墨水：</span><b id="ink">100%</b></div>
  </div>
  <canvas id="game" width="500" height="500"></canvas>
  <div class="btns">
    <button onclick="clearLines()">清除画线</button>
    <button onclick="startSim()">释放小球</button>
    <button onclick="resetLevel()">重置关卡</button>
  </div>
  <div class="hint">画线引导小球到达绿色目标区域</div>
</div>
<script>
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
const W=500,H=500;

const LEVELS=[
  {ball:{x:250,y:60,r:12},target:{x:230,y:420,w:60,h:40},obstacles:[{x:100,y:200,w:300,h:15}],hint:'画一条斜坡引导小球绕过障碍'},
  {ball:{x:80,y:60,r:12},target:{x:380,y:420,w:60,h:40},obstacles:[{x:0,y:180,w:250,h:15},{x:250,y:300,w:250,h:15}],hint:'画两条线让小球滚到右下方'},
  {ball:{x:250,y:50,r:12},target:{x:250,y:430,w:60,h:40},obstacles:[{x:150,y:160,w:200,h:15},{x:50,y:280,w:200,h:15},{x:250,y:370,w:200,h:15}],hint:'画线在每层引导小球穿过'},
  {ball:{x:50,y:50,r:12},target:{x:430,y:430,w:50,h:50},obstacles:[{x:200,y:100,w:15,h:300},{x:100,y:250,w:300,h:15}],hint:'画线帮小球翻过墙壁'},
  {ball:{x:250,y:50,r:12},target:{x:250,y:440,w:50,h:40},obstacles:[{x:0,y:150,w:200,h:12},{x:300,y:150,w:200,h:12},{x:100,y:260,w:300,h:12},{x:0,y:370,w:180,h:12},{x:320,y:370,w:180,h:12}],hint:'复杂迷宫，细心画线！'},
];

let level=0,lines=[],currentLine=null,drawing=false,simulating=false;
let ball,ballVx,ballVy,ink,won;
const GRAVITY=0.25,FRICTION=0.98,BOUNCE=0.6,MAX_INK=500;

function loadLevel(){
  const lv=LEVELS[level];
  ball={...lv.ball};ballVx=0;ballVy=0;
  lines=[];currentLine=null;drawing=false;simulating=false;ink=MAX_INK;won=false;
  document.getElementById('levelNum').textContent=level+1;
  document.getElementById('ink').textContent='100%';
  draw();
}
function draw(){
  ctx.clearRect(0,0,W,H);
  const lv=LEVELS[level];
  // Target
  ctx.fillStyle='rgba(34,197,94,.3)';ctx.fillRect(lv.target.x,lv.target.y,lv.target.w,lv.target.h);
  ctx.strokeStyle='#22c55e';ctx.lineWidth=2;ctx.strokeRect(lv.target.x,lv.target.y,lv.target.w,lv.target.h);
  ctx.fillStyle='#22c55e';ctx.font='16px sans-serif';ctx.textAlign='center';
  ctx.fillText('⭐',lv.target.x+lv.target.w/2,lv.target.y+lv.target.h/2+6);
  // Obstacles
  ctx.fillStyle='#4a3666';
  lv.obstacles.forEach(o=>{ctx.beginPath();ctx.roundRect(o.x,o.y,o.w,o.h,3);ctx.fill()});
  // Drawn lines
  ctx.strokeStyle='#a855f7';ctx.lineWidth=4;ctx.lineCap='round';ctx.lineJoin='round';
  lines.forEach(line=>{
    if(line.length<2)return;
    ctx.beginPath();ctx.moveTo(line[0].x,line[0].y);
    for(let i=1;i<line.length;i++)ctx.lineTo(line[i].x,line[i].y);
    ctx.stroke();
  });
  if(currentLine&&currentLine.length>1){
    ctx.beginPath();ctx.moveTo(currentLine[0].x,currentLine[0].y);
    for(let i=1;i<currentLine.length;i++)ctx.lineTo(currentLine[i].x,currentLine[i].y);
    ctx.stroke();
  }
  // Ball
  const grad=ctx.createRadialGradient(ball.x-3,ball.y-3,2,ball.x,ball.y,ball.r);
  grad.addColorStop(0,'#e879f9');grad.addColorStop(1,'#a855f7');
  ctx.fillStyle=grad;ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);ctx.fill();
  // Hint
  if(!simulating&&lines.length===0){
    ctx.fillStyle='rgba(255,255,255,.25)';ctx.font='13px sans-serif';ctx.textAlign='center';
    ctx.fillText(lv.hint,W/2,H-15);
  }
  // Win overlay
  if(won){
    ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#22c55e';ctx.font='bold 28px sans-serif';ctx.textAlign='center';
    ctx.fillText('🎉 过关！',W/2,H/2-10);
    ctx.font='14px sans-serif';ctx.fillStyle='rgba(255,255,255,.6)';
    ctx.fillText(level<LEVELS.length-1?'点击进入下一关':'恭喜通关全部关卡！',W/2,H/2+25);
  }
}
// Line segment collision
function lineCollide(bx,by,br,p1,p2){
  const dx=p2.x-p1.x,dy=p2.y-p1.y;
  const len=Math.sqrt(dx*dx+dy*dy);if(len<1)return null;
  const nx=-dy/len,ny=dx/len;
  const dist=(bx-p1.x)*nx+(by-p1.y)*ny;
  if(Math.abs(dist)>br)return null;
  const t=((bx-p1.x)*dx+(by-p1.y)*dy)/(len*len);
  if(t<0||t>1)return null;
  return{nx,ny,dist,pen:br-Math.abs(dist)};
}
function rectCollide(bx,by,br,rx,ry,rw,rh){
  const cx=Math.max(rx,Math.min(bx,rx+rw)),cy=Math.max(ry,Math.min(by,ry+rh));
  const dx=bx-cx,dy=by-cy,d=Math.sqrt(dx*dx+dy*dy);
  if(d<br&&d>0)return{nx:dx/d,ny:dy/d,pen:br-d};
  return null;
}
function simulate(){
  if(!simulating||won)return;
  const lv=LEVELS[level];
  ballVy+=GRAVITY;
  ball.x+=ballVx;ball.y+=ballVy;
  // Walls
  if(ball.x-ball.r<0){ball.x=ball.r;ballVx=Math.abs(ballVx)*BOUNCE}
  if(ball.x+ball.r>W){ball.x=W-ball.r;ballVx=-Math.abs(ballVx)*BOUNCE}
  if(ball.y-ball.r<0){ball.y=ball.r;ballVy=Math.abs(ballVy)*BOUNCE}
  if(ball.y+ball.r>H){ball.y=H-ball.r;ballVy=-Math.abs(ballVy)*BOUNCE;ballVx*=FRICTION}
  // Obstacle collision
  lv.obstacles.forEach(o=>{
    const c=rectCollide(ball.x,ball.y,ball.r,o.x,o.y,o.w,o.h);
    if(c){ball.x+=c.nx*c.pen;ball.y+=c.ny*c.pen;
      const vn=ballVx*c.nx+ballVy*c.ny;
      ballVx-=2*vn*c.nx*BOUNCE;ballVy-=2*vn*c.ny*BOUNCE;
      ballVx*=FRICTION;ballVy*=FRICTION;
    }
  });
  // Line collision
  lines.forEach(line=>{
    for(let i=0;i<line.length-1;i++){
      const c=lineCollide(ball.x,ball.y,ball.r,line[i],line[i+1]);
      if(c){ball.x+=c.nx*c.pen*(c.dist>0?1:-1);ball.y+=c.ny*c.pen*(c.dist>0?1:-1);
        const vn=ballVx*c.nx+ballVy*c.ny;
        ballVx-=2*vn*c.nx*BOUNCE;ballVy-=2*vn*c.ny*BOUNCE;
        ballVx*=FRICTION;ballVy*=FRICTION;
      }
    }
  });
  // Check target
  const t=lv.target;
  if(ball.x>t.x&&ball.x<t.x+t.w&&ball.y>t.y&&ball.y<t.y+t.h){
    won=true;simulating=false;
    draw();
    canvas.onclick=()=>{
      canvas.onclick=null;
      if(level<LEVELS.length-1){level++;loadLevel()}else{level=0;loadLevel()}
    };
    return;
  }
  draw();
  if(simulating)requestAnimationFrame(simulate);
}
function startSim(){
  if(simulating||won)return;
  simulating=true;
  const lv=LEVELS[level];
  ball={...lv.ball};ballVx=0;ballVy=0;
  simulate();
}
function clearLines(){if(!simulating){lines=[];ink=MAX_INK;document.getElementById('ink').textContent='100%';draw()}}
function resetLevel(){loadLevel()}

// Drawing
function getPos(e){
  const r=canvas.getBoundingClientRect();
  const t=e.touches?e.touches[0]:e;
  return{x:(t.clientX-r.left)*(W/r.width),y:(t.clientY-r.top)*(H/r.height)};
}
function onDown(e){
  if(simulating||won)return;e.preventDefault();
  drawing=true;currentLine=[getPos(e)];
}
function onMove(e){
  if(!drawing||simulating)return;e.preventDefault();
  if(ink<=0)return;
  const p=getPos(e);
  const last=currentLine[currentLine.length-1];
  const d=Math.sqrt((p.x-last.x)**2+(p.y-last.y)**2);
  if(d>4){currentLine.push(p);ink-=d;
    document.getElementById('ink').textContent=Math.max(0,Math.round(ink/MAX_INK*100))+'%';
    draw();
  }
}
function onUp(){
  if(!drawing)return;drawing=false;
  if(currentLine&&currentLine.length>1)lines.push(currentLine);
  currentLine=null;draw();
}
canvas.addEventListener('mousedown',onDown);canvas.addEventListener('mousemove',onMove);
canvas.addEventListener('mouseup',onUp);canvas.addEventListener('mouseleave',onUp);
canvas.addEventListener('touchstart',onDown,{passive:false});
canvas.addEventListener('touchmove',onMove,{passive:false});
canvas.addEventListener('touchend',onUp);

loadLevel();
</script>
</body>
</html>

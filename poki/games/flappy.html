<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>飞翔小鸟 - PlayHub</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#1a1b2e;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh}.top-bar{width:100%;padding:12px 24px;display:flex;align-items:center;gap:16px;background:#12132a;border-bottom:1px solid rgba(255,255,255,.06)}.back-btn{padding:6px 16px;border-radius:20px;background:rgba(124,92,252,.2);color:#a78bfa;font-size:.85rem;text-decoration:none}.game-title{font-size:1.1rem;font-weight:700}.container{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:12px}canvas{border-radius:8px;box-shadow:0 0 30px rgba(56,189,248,.1);cursor:pointer}.hint{font-size:.75rem;opacity:.4}</style></head><body>
<div class="top-bar"><a class="back-btn" href="../index.html">← 返回</a><span class="game-title">🐦 飞翔小鸟</span></div>
<div class="container">
<canvas id="game" width="320" height="480"></canvas>
<div class="hint">点击 / 空格拍翅膀</div>
</div>
<script>
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
const W=320,H=480,GAP=130,PIPE_W=52;
let bird,pipes,score,best=+localStorage.getItem('flappy_best')||0,running,started;
const GRAVITY=0.4,FLAP=-7;

function init(){
  bird={x:80,y:H/2,vy:0,r:14};pipes=[];score=0;running=false;started=false;
  drawStart();
}
function drawStart(){
  draw();ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#fff';ctx.font='bold 24px sans-serif';ctx.textAlign='center';
  ctx.fillText('🐦 飞翔小鸟',W/2,H/2-30);ctx.font='14px sans-serif';ctx.fillStyle='rgba(255,255,255,.6)';
  ctx.fillText('点击开始',W/2,H/2+5);if(best)ctx.fillText('最高: '+best,W/2,H/2+30);
}
function flap(){
  if(!started){started=true;running=true;loop();return}
  if(!running){init();return}
  bird.vy=FLAP;
}
function spawnPipe(){
  const topH=60+Math.random()*(H-GAP-120);
  pipes.push({x:W,top:topH,passed:false});
}
function update(){
  if(!running)return;
  bird.vy+=GRAVITY;bird.y+=bird.vy;
  if(bird.y+bird.r>H||bird.y-bird.r<0){die();return}
  if(pipes.length===0||pipes[pipes.length-1].x<W-180)spawnPipe();
  for(let i=pipes.length-1;i>=0;i--){
    const p=pipes[i];p.x-=2.5;
    if(p.x+PIPE_W<0){pipes.splice(i,1);continue}
    if(!p.passed&&p.x+PIPE_W<bird.x){p.passed=true;score++}
    if(bird.x+bird.r>p.x&&bird.x-bird.r<p.x+PIPE_W){
      if(bird.y-bird.r<p.top||bird.y+bird.r>p.top+GAP){die();return}
    }
  }
}
function die(){
  running=false;if(score>best){best=score;localStorage.setItem('flappy_best',best)}
  draw();ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#fff';ctx.font='bold 36px sans-serif';ctx.textAlign='center';ctx.fillText(score,W/2,H/2-10);
  ctx.font='14px sans-serif';ctx.fillStyle='rgba(255,255,255,.5)';ctx.fillText('点击重新开始',W/2,H/2+25);
}
function draw(){
  // sky
  const sky=ctx.createLinearGradient(0,0,0,H);sky.addColorStop(0,'#38bdf8');sky.addColorStop(1,'#0ea5e9');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);
  // ground
  ctx.fillStyle='#65a30d';ctx.fillRect(0,H-30,W,30);ctx.fillStyle='#84cc16';ctx.fillRect(0,H-30,W,5);
  // pipes
  pipes.forEach(p=>{
    ctx.fillStyle='#16a34a';ctx.fillRect(p.x,0,PIPE_W,p.top);ctx.fillRect(p.x,p.top+GAP,PIPE_W,H-p.top-GAP);
    ctx.fillStyle='#22c55e';ctx.fillRect(p.x-3,p.top-20,PIPE_W+6,20);ctx.fillRect(p.x-3,p.top+GAP,PIPE_W+6,20);
  });
  // bird
  ctx.fillStyle='#fbbf24';ctx.beginPath();ctx.arc(bird.x,bird.y,bird.r,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(bird.x+5,bird.y-3,5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#111';ctx.beginPath();ctx.arc(bird.x+6,bird.y-3,2.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#f97316';ctx.beginPath();ctx.moveTo(bird.x+bird.r,bird.y);ctx.lineTo(bird.x+bird.r+8,bird.y-2);ctx.lineTo(bird.x+bird.r+8,bird.y+4);ctx.closePath();ctx.fill();
  // wing
  const wingY=Math.sin(Date.now()*0.01)*3;
  ctx.fillStyle='#f59e0b';ctx.beginPath();ctx.ellipse(bird.x-5,bird.y+wingY,10,5,-0.3,0,Math.PI*2);ctx.fill();
  // score
  ctx.fillStyle='#fff';ctx.font='bold 32px sans-serif';ctx.textAlign='center';ctx.strokeStyle='rgba(0,0,0,.3)';ctx.lineWidth=3;ctx.strokeText(score,W/2,50);ctx.fillText(score,W/2,50);
}
function loop(){update();draw();if(running)requestAnimationFrame(loop)}
document.addEventListener('keydown',e=>{if(e.key===' '){e.preventDefault();flap()}});
canvas.addEventListener('click',flap);canvas.addEventListener('touchstart',e=>{e.preventDefault();flap()},{passive:false});
init();
</script></body></html>

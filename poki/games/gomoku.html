<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>五子棋(AI) - PlayHub</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1b2e;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh}
.top-bar{width:100%;padding:12px 24px;display:flex;align-items:center;gap:16px;background:#12132a;border-bottom:1px solid rgba(255,255,255,.06)}
.back-btn{padding:6px 16px;border-radius:20px;background:rgba(124,92,252,.2);color:#a78bfa;font-size:.85rem;text-decoration:none}
.back-btn:hover{background:rgba(124,92,252,.4)}
.game-title{font-size:1.1rem;font-weight:700}
.container{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:16px}
.status{font-size:1rem}
canvas{border-radius:8px;cursor:crosshair;box-shadow:0 0 40px rgba(100,116,139,.12)}
.btns button{padding:8px 20px;border-radius:16px;background:rgba(255,255,255,.08);font-size:.85rem;border:1px solid rgba(255,255,255,.1)}
.btns button:hover{background:rgba(255,255,255,.15)}
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:rgba(0,0,0,.7);border-radius:8px;font-size:1.1rem}
.overlay button{padding:8px 28px;border-radius:20px;background:#64748b;color:#fff;font-weight:700;font-size:.9rem}
</style>
</head>
<body>
<div class="top-bar">
  <a class="back-btn" href="../index.html">← 返回</a>
  <span class="game-title">⚪ 五子棋 (vs AI)</span>
</div>
<div class="container">
  <div class="status" id="status">你执黑棋，请落子</div>
  <div style="position:relative;display:inline-block">
    <canvas id="board" width="450" height="450"></canvas>
    <div id="overlay" class="overlay" style="display:none"></div>
  </div>
  <div class="btns"><button onclick="init()">重新开始</button></div>
</div>
<script>
const canvas=document.getElementById('board'),ctx=canvas.getContext('2d');
const ov=document.getElementById('overlay');
const SIZE=15,PAD=25,CELL=(canvas.width-PAD*2)/(SIZE-1);
let grid,gameOver,thinking;
const HUMAN=1,AI=2; // 1=black(human), 2=white(AI)

function init(){
  grid=Array.from({length:SIZE},()=>Array(SIZE).fill(0));
  gameOver=false;thinking=false;
  document.getElementById('status').textContent='你执黑棋，请落子';
  ov.style.display='none';draw();
}
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#c8a96e';ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle='#8b6914';ctx.lineWidth=.8;
  for(let i=0;i<SIZE;i++){
    ctx.beginPath();ctx.moveTo(PAD,PAD+i*CELL);ctx.lineTo(PAD+(SIZE-1)*CELL,PAD+i*CELL);ctx.stroke();
    ctx.beginPath();ctx.moveTo(PAD+i*CELL,PAD);ctx.lineTo(PAD+i*CELL,PAD+(SIZE-1)*CELL);ctx.stroke();
  }
  const stars=[3,7,11];ctx.fillStyle='#8b6914';
  for(const r of stars)for(const c of stars){ctx.beginPath();ctx.arc(PAD+c*CELL,PAD+r*CELL,3,0,Math.PI*2);ctx.fill()}
  for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){
    if(!grid[r][c])continue;
    const x=PAD+c*CELL,y=PAD+r*CELL;
    const grad=ctx.createRadialGradient(x-3,y-3,2,x,y,CELL/2-2);
    if(grid[r][c]===HUMAN){grad.addColorStop(0,'#555');grad.addColorStop(1,'#111')}
    else{grad.addColorStop(0,'#fff');grad.addColorStop(1,'#ccc')}
    ctx.fillStyle=grad;ctx.beginPath();ctx.arc(x,y,CELL/2-2,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=grid[r][c]===HUMAN?'rgba(0,0,0,.3)':'rgba(0,0,0,.15)';ctx.lineWidth=1;ctx.stroke();
  }
}
function check(r,c,dr,dc){
  const p=grid[r][c];let count=1;
  for(let d=1;d<5;d++){const nr=r+dr*d,nc=c+dc*d;if(nr<0||nr>=SIZE||nc<0||nc>=SIZE||grid[nr][nc]!==p)break;count++}
  for(let d=1;d<5;d++){const nr=r-dr*d,nc=c-dc*d;if(nr<0||nr>=SIZE||nc<0||nc>=SIZE||grid[nr][nc]!==p)break;count++}
  return count>=5;
}
function checkWin(r,c){return check(r,c,1,0)||check(r,c,0,1)||check(r,c,1,1)||check(r,c,1,-1)}

// AI: evaluate board position
function evaluateLine(cells,player){
  const opp=player===HUMAN?AI:HUMAN;
  let mine=0,open=0,blocked=0;
  cells.forEach(v=>{if(v===player)mine++;else if(v===0)open++;else blocked++});
  if(mine===5)return 100000;
  if(mine===4&&open>=1)return blocked===0?10000:5000;
  if(mine===3&&open>=2)return blocked===0?1000:200;
  if(mine===2&&open>=3)return blocked===0?100:10;
  if(mine===1&&open>=4)return 1;
  return 0;
}
function scorePosition(r,c,player){
  let total=0;
  const dirs=[[0,1],[1,0],[1,1],[1,-1]];
  for(const[dr,dc]of dirs){
    // Get 5-cell window centered at (r,c) in this direction
    for(let start=-4;start<=0;start++){
      const cells=[];
      for(let i=0;i<5;i++){
        const nr=r+dr*(start+i),nc=c+dc*(start+i);
        if(nr<0||nr>=SIZE||nc<0||nc>=SIZE){cells.push(-1);continue}
        cells.push(grid[nr][nc]);
      }
      if(cells.includes(-1))continue;
      total+=evaluateLine(cells,player);
    }
  }
  return total;
}
function aiMove(){
  thinking=true;
  document.getElementById('status').textContent='AI 思考中...';
  setTimeout(()=>{
    let bestScore=-Infinity,bestR=7,bestC=7;
    // Only consider positions near existing stones
    const candidates=new Set();
    for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){
      if(grid[r][c]===0)continue;
      for(let dr=-2;dr<=2;dr++)for(let dc=-2;dc<=2;dc++){
        const nr=r+dr,nc=c+dc;
        if(nr>=0&&nr<SIZE&&nc>=0&&nc<SIZE&&grid[nr][nc]===0)candidates.add(nr*SIZE+nc);
      }
    }
    if(candidates.size===0)candidates.add(7*SIZE+7);
    candidates.forEach(pos=>{
      const r=Math.floor(pos/SIZE),c=pos%SIZE;
      // Score = AI attack + defense against human
      const attack=scorePosition(r,c,AI);
      const defense=scorePosition(r,c,HUMAN);
      const s=attack*1.1+defense;
      if(s>bestScore){bestScore=s;bestR=r;bestC=c}
    });
    grid[bestR][bestC]=AI;draw();
    if(checkWin(bestR,bestC)){
      gameOver=true;ov.style.display='flex';
      ov.innerHTML=`<div>⚪ AI 获胜</div><button onclick="init()">再来一局</button>`;
    }else{
      document.getElementById('status').textContent='你执黑棋，请落子';
    }
    thinking=false;
  },100);
}
canvas.addEventListener('click',e=>{
  if(gameOver||thinking)return;
  const rect=canvas.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(canvas.width/rect.width);
  const my=(e.clientY-rect.top)*(canvas.height/rect.height);
  const c=Math.round((mx-PAD)/CELL),r=Math.round((my-PAD)/CELL);
  if(r<0||r>=SIZE||c<0||c>=SIZE||grid[r][c])return;
  grid[r][c]=HUMAN;draw();
  if(checkWin(r,c)){
    gameOver=true;ov.style.display='flex';
    ov.innerHTML=`<div>⚫ 你赢了！</div><button onclick="init()">再来一局</button>`;
    return;
  }
  aiMove();
});
init();
</script>
</body>
</html>

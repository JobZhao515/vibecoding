<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>双人乒乓 - PlayHub</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1b2e;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh}
.top-bar{width:100%;padding:12px 24px;display:flex;align-items:center;gap:16px;background:#12132a;border-bottom:1px solid rgba(255,255,255,.06)}
.back-btn{padding:6px 16px;border-radius:20px;background:rgba(124,92,252,.2);color:#a78bfa;font-size:.85rem;text-decoration:none}
.back-btn:hover{background:rgba(124,92,252,.4)}
.game-title{font-size:1.1rem;font-weight:700}
.container{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:12px}
canvas{border-radius:8px;background:#0a0a1a;box-shadow:0 0 40px rgba(236,72,153,.12)}
.hint{font-size:.75rem;opacity:.4;text-align:center}
.controls-row{display:flex;gap:32px;margin-top:8px}
.ctrl-group{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:.7rem;opacity:.5}
.ctrl-group .btns{display:flex;gap:4px}
.ctrl-group button{width:44px;height:44px;border-radius:10px;background:rgba(255,255,255,.08);font-size:1rem;border:1px solid rgba(255,255,255,.1)}
.ctrl-group button:hover{background:rgba(255,255,255,.15)}
</style>
</head>
<body>
<div class="top-bar">
  <a class="back-btn" href="../index.html">← 返回</a>
  <span class="game-title">🏓 双人乒乓</span>
</div>
<div class="container">
  <canvas id="game" width="600" height="400"></canvas>
  <div class="hint">玩家1: W/S · 玩家2: ↑/↓ · 先到11分获胜</div>
  <div class="controls-row">
    <div class="ctrl-group">
      <span>玩家1</span>
      <div class="btns">
        <button id="p1u">W</button>
        <button id="p1d">S</button>
      </div>
    </div>
    <div class="ctrl-group">
      <span>玩家2</span>
      <div class="btns">
        <button id="p2u">↑</button>
        <button id="p2d">↓</button>
      </div>
    </div>
  </div>
</div>
<script>
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
const W=canvas.width,H=canvas.height;
const PADDLE_H=80,PADDLE_W=12,BALL_R=8,SPEED=5,WIN=11;
let p1y,p2y,ball,score1,score2,running,paused;
const keys={};

function init(){
  p1y=H/2-PADDLE_H/2;p2y=H/2-PADDLE_H/2;
  score1=0;score2=0;running=true;paused=false;
  resetBall(1);loop();
}
function resetBall(dir){
  ball={x:W/2,y:H/2,vx:4*dir,vy:(Math.random()*4-2)};
}
document.addEventListener('keydown',e=>{keys[e.key]=true;if(['ArrowUp','ArrowDown','w','s'].includes(e.key))e.preventDefault()});
document.addEventListener('keyup',e=>{keys[e.key]=false});
// Touch buttons
['p1u','p1d','p2u','p2d'].forEach(id=>{
  const el=document.getElementById(id);
  const k={p1u:'w',p1d:'s',p2u:'ArrowUp',p2d:'ArrowDown'}[id];
  el.addEventListener('touchstart',e=>{e.preventDefault();keys[k]=true},{passive:false});
  el.addEventListener('touchend',()=>{keys[k]=false});
  el.addEventListener('mousedown',()=>{keys[k]=true});
  el.addEventListener('mouseup',()=>{keys[k]=false});
  el.addEventListener('mouseleave',()=>{keys[k]=false});
});

function update(){
  if(!running||paused)return;
  // Paddles
  if(keys['w']||keys['W'])p1y=Math.max(0,p1y-SPEED);
  if(keys['s']||keys['S'])p1y=Math.min(H-PADDLE_H,p1y+SPEED);
  if(keys['ArrowUp'])p2y=Math.max(0,p2y-SPEED);
  if(keys['ArrowDown'])p2y=Math.min(H-PADDLE_H,p2y+SPEED);
  // Ball
  ball.x+=ball.vx;ball.y+=ball.vy;
  // Top/bottom bounce
  if(ball.y-BALL_R<0){ball.y=BALL_R;ball.vy*=-1}
  if(ball.y+BALL_R>H){ball.y=H-BALL_R;ball.vy*=-1}
  // Paddle collision
  if(ball.x-BALL_R<PADDLE_W+10&&ball.y>p1y&&ball.y<p1y+PADDLE_H&&ball.vx<0){
    ball.vx*=-1.05;ball.vy+=(ball.y-(p1y+PADDLE_H/2))*0.1;ball.x=PADDLE_W+10+BALL_R;
  }
  if(ball.x+BALL_R>W-PADDLE_W-10&&ball.y>p2y&&ball.y<p2y+PADDLE_H&&ball.vx>0){
    ball.vx*=-1.05;ball.vy+=(ball.y-(p2y+PADDLE_H/2))*0.1;ball.x=W-PADDLE_W-10-BALL_R;
  }
  // Clamp ball speed
  const spd=Math.sqrt(ball.vx*ball.vx+ball.vy*ball.vy);
  if(spd>12){ball.vx*=12/spd;ball.vy*=12/spd}
  // Score
  if(ball.x<0){score2++;checkWin()||resetBall(1)}
  if(ball.x>W){score1++;checkWin()||resetBall(-1)}
}
function checkWin(){
  if(score1>=WIN||score2>=WIN){
    running=false;
    setTimeout(()=>{
      ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillRect(0,0,W,H);
      ctx.fillStyle='#fff';ctx.font='bold 32px sans-serif';ctx.textAlign='center';
      ctx.fillText(`${score1>=WIN?'玩家1':'玩家2'} 获胜！`,W/2,H/2-20);
      ctx.font='18px sans-serif';ctx.fillStyle='rgba(255,255,255,.6)';
      ctx.fillText('点击重新开始',W/2,H/2+20);
    },50);
    canvas.onclick=()=>{canvas.onclick=null;init()};
    return true;
  }
  return false;
}
function draw(){
  ctx.clearRect(0,0,W,H);
  // Center line
  ctx.setLineDash([8,8]);ctx.strokeStyle='rgba(255,255,255,.15)';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();ctx.setLineDash([]);
  // Score
  ctx.fillStyle='rgba(255,255,255,.2)';ctx.font='bold 64px sans-serif';ctx.textAlign='center';
  ctx.fillText(score1,W/4,80);ctx.fillText(score2,3*W/4,80);
  // Paddles
  ctx.fillStyle='#ec4899';
  ctx.beginPath();ctx.roundRect(10,p1y,PADDLE_W,PADDLE_H,6);ctx.fill();
  ctx.fillStyle='#06b6d4';
  ctx.beginPath();ctx.roundRect(W-10-PADDLE_W,p2y,PADDLE_W,PADDLE_H,6);ctx.fill();
  // Ball
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(ball.x,ball.y,BALL_R,0,Math.PI*2);ctx.fill();
  // Ball trail
  ctx.fillStyle='rgba(255,255,255,.1)';ctx.beginPath();ctx.arc(ball.x-ball.vx,ball.y-ball.vy,BALL_R-2,0,Math.PI*2);ctx.fill();
}
function loop(){update();draw();if(running)requestAnimationFrame(loop)}
init();
</script>
</body>
</html>

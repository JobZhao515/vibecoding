<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>简易跑酷 - PlayHub</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1b2e;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh}
.top-bar{width:100%;padding:12px 24px;display:flex;align-items:center;gap:16px;background:#12132a;border-bottom:1px solid rgba(255,255,255,.06)}
.back-btn{padding:6px 16px;border-radius:20px;background:rgba(124,92,252,.2);color:#a78bfa;font-size:.85rem;text-decoration:none}
.back-btn:hover{background:rgba(124,92,252,.4)}
.game-title{font-size:1.1rem;font-weight:700}
.container{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:12px}
canvas{border-radius:8px;background:#1a1025;box-shadow:0 0 40px rgba(249,115,22,.12);cursor:pointer}
.hint{font-size:.75rem;opacity:.4}
</style>
</head>
<body>
<div class="top-bar">
  <a class="back-btn" href="../index.html">← 返回</a>
  <span class="game-title">🏃 简易跑酷</span>
</div>
<div class="container">
  <canvas id="game" width="600" height="300"></canvas>
  <div class="hint">空格 / 点击跳跃 · 双击二段跳</div>
</div>
<script>
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
const W=600,H=300,GROUND=H-50;
let player,obstacles,particles,score,bestScore=+localStorage.getItem('runner_best')||0,speed,running,started;
const GRAVITY=0.6,JUMP=-11,DOUBLE_JUMP=-9;

function init(){
  player={x:80,y:GROUND,vy:0,w:24,h:36,onGround:true,jumps:0,ducking:false};
  obstacles=[];particles=[];score=0;speed=4;running=false;started=false;
  draw();
  // Start screen
  ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#fff';ctx.font='bold 24px sans-serif';ctx.textAlign='center';
  ctx.fillText('🏃 简易跑酷',W/2,H/2-20);
  ctx.font='16px sans-serif';ctx.fillStyle='rgba(255,255,255,.6)';
  ctx.fillText('点击或空格开始',W/2,H/2+15);
  if(bestScore)ctx.fillText(`最高分: ${bestScore}`,W/2,H/2+45);
}
function start(){
  if(started)return;
  started=true;running=true;loop();
}
function jump(){
  if(!started){start();return}
  if(!running){init();return}
  if(player.jumps<2){
    player.vy=player.jumps===0?JUMP:DOUBLE_JUMP;
    player.onGround=false;player.jumps++;
    // Jump particles
    for(let i=0;i<5;i++)particles.push({x:player.x,y:player.y+player.h,vx:Math.random()*2-1,vy:-Math.random()*3,life:15,color:'rgba(249,115,22,.6)'});
  }
}
function spawnObstacle(){
  const types=[
    {w:20,h:30+Math.random()*20,color:'#ef4444'},
    {w:30,h:20,color:'#f59e0b'},
    {w:15,h:50,color:'#ec4899'},
  ];
  const t=types[Math.floor(Math.random()*types.length)];
  obstacles.push({x:W+50,y:GROUND-t.h+player.h,w:t.w,h:t.h,color:t.color});
}
function update(){
  if(!running)return;
  score++;speed=4+score/500;
  // Player physics
  player.vy+=GRAVITY;player.y+=player.vy;
  if(player.y>=GROUND){player.y=GROUND;player.vy=0;player.onGround=true;player.jumps=0}
  // Obstacles
  if(obstacles.length===0||obstacles[obstacles.length-1].x<W-150-Math.random()*200)spawnObstacle();
  for(let i=obstacles.length-1;i>=0;i--){
    obstacles[i].x-=speed;
    if(obstacles[i].x+obstacles[i].w<0){obstacles.splice(i,1);continue}
    // Collision
    const o=obstacles[i],p=player;
    if(p.x+p.w-8>o.x&&p.x+8<o.x+o.w&&p.y+p.h>o.y&&p.y<o.y+o.h){
      gameOver();return;
    }
  }
  // Particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.life--;
    if(p.life<=0)particles.splice(i,1);
  }
}
function draw(){
  ctx.clearRect(0,0,W,H);
  // Sky gradient
  const sky=ctx.createLinearGradient(0,0,0,H);sky.addColorStop(0,'#0f0520');sky.addColorStop(1,'#1a1025');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);
  // Stars
  ctx.fillStyle='rgba(255,255,255,.3)';
  for(let i=0;i<20;i++){const sx=(i*73+score*0.1*(i%3+1))%W;ctx.fillRect(sx,30+i*12%200,1.5,1.5)}
  // Ground
  ctx.fillStyle='#2d1f3d';ctx.fillRect(0,GROUND+player.h,W,50);
  ctx.strokeStyle='#6b21a8';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,GROUND+player.h);ctx.lineTo(W,GROUND+player.h);ctx.stroke();
  // Ground detail
  ctx.fillStyle='rgba(107,33,168,.3)';
  for(let i=0;i<30;i++){const gx=(i*47-score*speed*0.3)%W;ctx.fillRect(gx<0?gx+W:gx,GROUND+player.h+5,20,2)}
  // Particles
  particles.forEach(p=>{ctx.globalAlpha=p.life/15;ctx.fillStyle=p.color;ctx.fillRect(p.x,p.y,3,3)});
  ctx.globalAlpha=1;
  // Obstacles
  obstacles.forEach(o=>{
    ctx.fillStyle=o.color;
    ctx.beginPath();ctx.roundRect(o.x,o.y,o.w,o.h,3);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.15)';ctx.fillRect(o.x,o.y,o.w,3);
  });
  // Player
  const p=player;
  ctx.fillStyle='#f97316';
  ctx.beginPath();ctx.roundRect(p.x,p.y,p.w,p.h,4);ctx.fill();
  // Player face
  ctx.fillStyle='#fff';ctx.fillRect(p.x+15,p.y+8,5,5);
  ctx.fillStyle='#111';ctx.fillRect(p.x+17,p.y+10,2,2);
  // Running legs animation
  if(p.onGround&&running){
    const legPhase=Math.sin(score*0.3)*6;
    ctx.fillStyle='#ea580c';
    ctx.fillRect(p.x+4,p.y+p.h,4,6+legPhase);
    ctx.fillRect(p.x+p.w-8,p.y+p.h,4,6-legPhase);
  }else{
    ctx.fillStyle='#ea580c';
    ctx.fillRect(p.x+4,p.y+p.h,4,6);ctx.fillRect(p.x+p.w-8,p.y+p.h,4,6);
  }
  // Score
  ctx.fillStyle='#fff';ctx.font='bold 20px sans-serif';ctx.textAlign='right';
  ctx.fillText(Math.floor(score/10),W-20,35);
  ctx.font='12px sans-serif';ctx.fillStyle='rgba(255,255,255,.4)';
  ctx.fillText(`最高: ${bestScore}`,W-20,55);
}
function gameOver(){
  running=false;
  const finalScore=Math.floor(score/10);
  if(finalScore>bestScore){bestScore=finalScore;localStorage.setItem('runner_best',bestScore)}
  // Death particles
  for(let i=0;i<20;i++)particles.push({x:player.x+player.w/2,y:player.y+player.h/2,vx:Math.random()*6-3,vy:-Math.random()*6,life:20,color:'#f97316'});
  draw();
  ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#fff';ctx.font='bold 28px sans-serif';ctx.textAlign='center';
  ctx.fillText(finalScore,W/2,H/2-15);
  ctx.font='14px sans-serif';ctx.fillStyle='rgba(255,255,255,.5)';
  ctx.fillText('点击或空格重新开始',W/2,H/2+20);
}
function loop(){update();draw();if(running)requestAnimationFrame(loop)}

document.addEventListener('keydown',e=>{if(e.key===' '||e.key==='ArrowUp'){e.preventDefault();jump()}});
canvas.addEventListener('click',jump);
canvas.addEventListener('touchstart',e=>{e.preventDefault();jump()},{passive:false});
init();
</script>
</body>
</html>

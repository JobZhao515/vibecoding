<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>沙子画 - PlayHub</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#1a1b2e;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh}.top-bar{width:100%;padding:12px 24px;display:flex;align-items:center;gap:16px;background:#12132a;border-bottom:1px solid rgba(255,255,255,.06)}.back-btn{padding:6px 16px;border-radius:20px;background:rgba(124,92,252,.2);color:#a78bfa;font-size:.85rem;text-decoration:none}.game-title{font-size:1.1rem;font-weight:700}.container{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:12px}canvas{border-radius:8px;background:#0a0a0a;box-shadow:0 0 30px rgba(251,191,36,.1);cursor:crosshair}.palette{display:flex;gap:6px}.palette div{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s}.palette div.active{border-color:#fff;transform:scale(1.15)}.controls{display:flex;gap:12px;align-items:center}.controls button{padding:4px 14px;border:none;border-radius:12px;background:#334155;color:#fff;font-size:.8rem;cursor:pointer}.hint{font-size:.75rem;opacity:.4}</style></head><body>
<div class="top-bar"><a class="back-btn" href="../index.html">← 返回</a><span class="game-title">⏳ 沙子画</span></div>
<div class="container">
<div class="palette" id="palette"></div>
<canvas id="game" width="400" height="400"></canvas>
<div class="controls"><button onclick="clearCanvas()">清空</button><label style="font-size:.8rem;opacity:.5"><input type="range" id="size" min="1" max="8" value="3" style="width:80px"> 粗细</label></div>
<div class="hint">鼠标/触屏在画布上撒沙子 · 沙子会自然下落堆积</div>
</div>
<script>
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
const W=400,H=400;
const COLORS=['#fbbf24','#f97316','#ef4444','#a855f7','#3b82f6','#22c55e','#ec4899','#fff','#64748b','#1e293b'];
let pixels,currentColor=0,drawing=false;

function initPixels(){pixels=new Uint8Array(W*H).fill(0);} // 0=empty, 1-10=colors
function clearCanvas(){initPixels()}

// palette
const pal=document.getElementById('palette');
COLORS.forEach((c,i)=>{
  const d=document.createElement('div');d.style.background=c;
  if(i===0)d.className='active';
  d.addEventListener('click',()=>{currentColor=i;document.querySelectorAll('.palette div').forEach(x=>x.className='');d.className='active'});
  pal.appendChild(d);
});

function getPos(e){
  const r=canvas.getBoundingClientRect();
  const x=Math.floor((e.clientX-r.left)*(W/r.width)),y=Math.floor((e.clientY-r.top)*(H/r.height));
  return{x,y};
}
function addSand(px,py){
  const sz=parseInt(document.getElementById('size').value);
  for(let i=-sz;i<=sz;i++)for(let j=-sz;j<=sz;j++){
    if(Math.random()>0.6)continue;
    const x=px+i,y=py+j;
    if(x>=0&&x<W&&y>=0&&y<H&&pixels[y*W+x]===0)pixels[y*W+x]=currentColor+1;
  }
}
canvas.addEventListener('mousedown',e=>{drawing=true;const{x,y}=getPos(e);addSand(x,y)});
canvas.addEventListener('mousemove',e=>{if(drawing){const{x,y}=getPos(e);addSand(x,y)}});
canvas.addEventListener('mouseup',()=>drawing=false);
canvas.addEventListener('mouseleave',()=>drawing=false);
canvas.addEventListener('touchstart',e=>{e.preventDefault();drawing=true;const{x,y}=getPos(e.touches[0]);addSand(x,y)},{passive:false});
canvas.addEventListener('touchmove',e=>{if(drawing){const{x,y}=getPos(e.touches[0]);addSand(x,y)}},{passive:true});
canvas.addEventListener('touchend',()=>drawing=false);

function simulate(){
  // bottom-up
  for(let y=H-2;y>=0;y--)for(let x=0;x<W;x++){
    const i=y*W+x;if(pixels[i]===0)continue;
    const below=(y+1)*W+x;
    if(pixels[below]===0){pixels[below]=pixels[i];pixels[i]=0;continue}
    const bl=(y+1)*W+x-1,br=(y+1)*W+x+1;
    const goLeft=x>0&&pixels[bl]===0,goRight=x<W-1&&pixels[br]===0;
    if(goLeft&&goRight){if(Math.random()>.5){pixels[bl]=pixels[i]}else{pixels[br]=pixels[i]}pixels[i]=0}
    else if(goLeft){pixels[bl]=pixels[i];pixels[i]=0}
    else if(goRight){pixels[br]=pixels[i];pixels[i]=0}
  }
}
function draw(){
  const imgData=ctx.createImageData(W,H);const d=imgData.data;
  for(let i=0;i<W*H;i++){
    if(pixels[i]===0){d[i*4+3]=0;continue}
    const hex=COLORS[pixels[i]-1];
    const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    d[i*4]=r;d[i*4+1]=g;d[i*4+2]=b;d[i*4+3]=255;
  }
  ctx.clearRect(0,0,W,H);ctx.putImageData(imgData,0,0);
}
function loop(){simulate();draw();requestAnimationFrame(loop)}
initPixels();loop();
</script></body></html>

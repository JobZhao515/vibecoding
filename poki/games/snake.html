<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>贪吃蛇 - PlayHub</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1b2e;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh}
.top-bar{width:100%;padding:12px 24px;display:flex;align-items:center;gap:16px;background:#12132a;border-bottom:1px solid rgba(255,255,255,.06)}
.back-btn{padding:6px 16px;border-radius:20px;background:rgba(124,92,252,.2);color:#a78bfa;font-size:.85rem;text-decoration:none;transition:background .2s}
.back-btn:hover{background:rgba(124,92,252,.4)}
.game-title{font-size:1.1rem;font-weight:700}
.container{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:16px}
canvas{border-radius:12px;background:#0f1021;box-shadow:0 0 40px rgba(34,197,94,.15)}
.score-bar{display:flex;gap:24px;font-size:.9rem}
.score-bar span{opacity:.6}
.score-bar b{color:#22c55e}
.controls{display:flex;gap:8px;margin-top:8px}
.controls button{width:50px;height:50px;border-radius:12px;background:rgba(255,255,255,.08);font-size:1.2rem;border:1px solid rgba(255,255,255,.1);transition:background .15s}
.controls button:hover{background:rgba(255,255,255,.15)}
.controls .spacer{width:50px}
.hint{font-size:.75rem;opacity:.4;margin-top:8px}
.overlay{position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:rgba(0,0,0,.7);border-radius:12px;font-size:1.2rem}
.overlay button{padding:8px 28px;border-radius:20px;background:#22c55e;color:#000;font-weight:700;font-size:.95rem;transition:transform .15s}
.overlay button:hover{transform:scale(1.05)}
</style>
</head>
<body>
<div class="top-bar">
  <a class="back-btn" href="../index.html">← 返回</a>
  <span class="game-title">🐍 贪吃蛇</span>
</div>
<div class="container">
  <div class="score-bar">
    <div><span>得分：</span><b id="score">0</b></div>
    <div><span>最高：</span><b id="best">0</b></div>
  </div>
  <div style="position:relative;display:inline-block">
    <canvas id="game" width="400" height="400"></canvas>
    <div id="overlay" class="overlay" style="display:none"></div>
  </div>
  <div class="controls">
    <div class="spacer"></div>
    <button onclick="setDir(0,-1)">↑</button>
    <div class="spacer"></div>
  </div>
  <div class="controls">
    <button onclick="setDir(-1,0)">←</button>
    <button onclick="setDir(0,1)">↓</button>
    <button onclick="setDir(1,0)">→</button>
  </div>
  <div class="hint">方向键 / WASD / 滑动控制</div>
</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const GRID = 20, CELL = canvas.width / GRID;
let snake, dir, nextDir, food, score, best = +localStorage.getItem('snake_best') || 0, running, speed, timer;

document.getElementById('best').textContent = best;

function init() {
  snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir = {x:1,y:0}; nextDir = {x:1,y:0};
  score = 0; speed = 150; running = true;
  document.getElementById('score').textContent = 0;
  placeFood();
  overlay.style.display = 'none';
  clearInterval(timer);
  timer = setInterval(tick, speed);
}

function placeFood() {
  do { food = {x: Math.floor(Math.random()*GRID), y: Math.floor(Math.random()*GRID)}; }
  while (snake.some(s => s.x === food.x && s.y === food.y));
}

function tick() {
  if (!running) return;
  dir = {...nextDir};
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
  // Wall collision
  if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID) return gameOver();
  // Self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) return gameOver();
  snake.unshift(head);
  if (head.x === food.x && head.y === food.y) {
    score++;
    document.getElementById('score').textContent = score;
    if (score > best) { best = score; localStorage.setItem('snake_best', best); document.getElementById('best').textContent = best; }
    placeFood();
    if (speed > 60) { speed -= 3; clearInterval(timer); timer = setInterval(tick, speed); }
  } else {
    snake.pop();
  }
  draw();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,.03)';
  for (let i = 0; i <= GRID; i++) {
    ctx.beginPath(); ctx.moveTo(i*CELL, 0); ctx.lineTo(i*CELL, canvas.height); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, i*CELL); ctx.lineTo(canvas.width, i*CELL); ctx.stroke();
  }
  // Food
  ctx.fillStyle = '#ef4444';
  ctx.beginPath(); ctx.arc(food.x*CELL+CELL/2, food.y*CELL+CELL/2, CELL/2-2, 0, Math.PI*2); ctx.fill();
  // Snake
  snake.forEach((s, i) => {
    const t = i / snake.length;
    ctx.fillStyle = `hsl(142, ${70-t*30}%, ${55-t*20}%)`;
    ctx.beginPath();
    ctx.roundRect(s.x*CELL+1, s.y*CELL+1, CELL-2, CELL-2, 4);
    ctx.fill();
  });
}

function gameOver() {
  running = false; clearInterval(timer);
  overlay.style.display = 'flex';
  overlay.style.inset = '0';
  overlay.innerHTML = `<div>💀 游戏结束</div><div style="font-size:2rem;font-weight:800">${score}</div><button onclick="init()">再来一局</button>`;
}

function setDir(x, y) {
  if (dir.x === -x && dir.y === -y) return; // no reverse
  nextDir = {x, y};
}

document.addEventListener('keydown', e => {
  switch(e.key) {
    case 'ArrowUp': case 'w': case 'W': e.preventDefault(); setDir(0,-1); break;
    case 'ArrowDown': case 's': case 'S': e.preventDefault(); setDir(0,1); break;
    case 'ArrowLeft': case 'a': case 'A': e.preventDefault(); setDir(-1,0); break;
    case 'ArrowRight': case 'd': case 'D': e.preventDefault(); setDir(1,0); break;
  }
});

// Touch swipe
let tx, ty;
canvas.addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; });
canvas.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx, dy = e.changedTouches[0].clientY - ty;
  if (Math.abs(dx) > Math.abs(dy)) setDir(dx > 0 ? 1 : -1, 0);
  else setDir(0, dy > 0 ? 1 : -1);
});

// Show start screen
overlay.style.display = 'flex'; overlay.style.inset = '0';
overlay.innerHTML = `<div>🐍 贪吃蛇</div><button onclick="init()">开始游戏</button>`;
draw(); // initial blank draw
ctx.clearRect(0,0,canvas.width,canvas.height);
</script>
</body>
</html>

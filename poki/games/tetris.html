<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>俄罗斯方块 - PlayHub</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1b2e;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh}
.top-bar{width:100%;padding:12px 24px;display:flex;align-items:center;gap:16px;background:#12132a;border-bottom:1px solid rgba(255,255,255,.06)}
.back-btn{padding:6px 16px;border-radius:20px;background:rgba(124,92,252,.2);color:#a78bfa;font-size:.85rem;text-decoration:none;transition:background .2s}
.back-btn:hover{background:rgba(124,92,252,.4)}
.game-title{font-size:1.1rem;font-weight:700}
.container{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;gap:24px}
.board-wrap{position:relative}
canvas{border-radius:8px;background:#0f1021;box-shadow:0 0 40px rgba(245,158,11,.12)}
.side{display:flex;flex-direction:column;gap:16px;min-width:100px}
.side .label{font-size:.7rem;opacity:.4;text-transform:uppercase;letter-spacing:1px}
.side .value{font-size:1.5rem;font-weight:800}
.next-box{width:100px;height:100px;background:#0f1021;border-radius:8px;overflow:hidden}
.controls{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:12px}
.controls button{width:46px;height:46px;border-radius:10px;background:rgba(255,255,255,.08);font-size:1.1rem;border:1px solid rgba(255,255,255,.1)}
.controls button:hover{background:rgba(255,255,255,.15)}
.hint{font-size:.7rem;opacity:.35;text-align:center;margin-top:8px}
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:rgba(0,0,0,.75);border-radius:8px;font-size:1.1rem}
.overlay button{padding:8px 28px;border-radius:20px;background:#f59e0b;color:#000;font-weight:700;font-size:.9rem}
</style>
</head>
<body>
<div class="top-bar">
  <a class="back-btn" href="../index.html">← 返回</a>
  <span class="game-title">🧱 俄罗斯方块</span>
</div>
<div class="container">
  <div class="side">
    <div><div class="label">得分</div><div class="value" id="score">0</div></div>
    <div><div class="label">消行</div><div class="value" id="lines">0</div></div>
    <div><div class="label">等级</div><div class="value" id="level">1</div></div>
    <div><div class="label">下一个</div><canvas id="next" class="next-box" width="100" height="100"></canvas></div>
  </div>
  <div class="board-wrap">
    <canvas id="board" width="250" height="500"></canvas>
    <div id="overlay" class="overlay" style="display:none"></div>
  </div>
</div>
<div class="controls">
  <button onclick="moveLeft()">←</button>
  <button onclick="rotate()">↻</button>
  <button onclick="hardDrop()">⤓</button>
  <button onclick="moveRight()">→</button>
  <button onclick="softDrop()">↓</button>
</div>
<div class="hint">方向键移动 · ↑旋转 · 空格硬降</div>
<script>
const COLS=10,ROWS=20,BLK=25;
const board=document.getElementById('board'),bctx=board.getContext('2d');
const nextC=document.getElementById('next'),nctx=nextC.getContext('2d');
const ov=document.getElementById('overlay');
const COLORS=['#06b6d4','#f59e0b','#a855f7','#22c55e','#ef4444','#3b82f6','#ec4899'];
const SHAPES=[
  [[1,1,1,1]],                     // I
  [[1,1],[1,1]],                    // O
  [[0,1,0],[1,1,1]],               // T
  [[0,1,1],[1,1,0]],               // S
  [[1,1,0],[0,1,1]],               // Z
  [[1,0,0],[1,1,1]],               // L
  [[0,0,1],[1,1,1]]                // J
];
let grid,cur,curX,curY,curColor,nextPiece,nextColor,score,lines,level,timer,running;

function newPiece(){
  const i=Math.floor(Math.random()*SHAPES.length);
  return {shape:SHAPES[i].map(r=>[...r]),color:COLORS[i]};
}
function init(){
  grid=Array.from({length:ROWS},()=>Array(COLS).fill(0));
  const p=newPiece(); cur=p.shape; curColor=p.color;
  curX=Math.floor((COLS-cur[0].length)/2); curY=0;
  const n=newPiece(); nextPiece=n.shape; nextColor=n.color;
  score=0;lines=0;level=1;running=true;
  updateUI(); drawNext(); ov.style.display='none';
  clearInterval(timer); timer=setInterval(tick,getSpeed());
}
function getSpeed(){return Math.max(100,500-level*40)}
function updateUI(){
  document.getElementById('score').textContent=score;
  document.getElementById('lines').textContent=lines;
  document.getElementById('level').textContent=level;
}
function fits(shape,ox,oy){
  for(let r=0;r<shape.length;r++)for(let c=0;c<shape[r].length;c++){
    if(!shape[r][c])continue;
    const nx=ox+c,ny=oy+r;
    if(nx<0||nx>=COLS||ny>=ROWS)return false;
    if(ny>=0&&grid[ny][nx])return false;
  }
  return true;
}
function lock(){
  for(let r=0;r<cur.length;r++)for(let c=0;c<cur[r].length;c++){
    if(!cur[r][c])continue;
    const y=curY+r;
    if(y<0){gameOver();return}
    grid[y][curX+c]=curColor;
  }
  clearLines();
  cur=nextPiece;curColor=nextColor;
  const n=newPiece();nextPiece=n.shape;nextColor=n.color;
  curX=Math.floor((COLS-cur[0].length)/2);curY=0;
  drawNext();
  if(!fits(cur,curX,curY))gameOver();
}
function clearLines(){
  let cleared=0;
  for(let r=ROWS-1;r>=0;r--){
    if(grid[r].every(c=>c)){grid.splice(r,1);grid.unshift(Array(COLS).fill(0));cleared++;r++;}
  }
  if(cleared){
    lines+=cleared; score+=[0,100,300,500,800][cleared]*level;
    const newLevel=Math.floor(lines/10)+1;
    if(newLevel!==level){level=newLevel;clearInterval(timer);timer=setInterval(tick,getSpeed());}
    updateUI();
  }
}
function tick(){if(!running)return;if(fits(cur,curX,curY+1)){curY++}else{lock()}draw()}
function draw(){
  bctx.clearRect(0,0,board.width,board.height);
  // Grid lines
  bctx.strokeStyle='rgba(255,255,255,.03)';
  for(let c=0;c<=COLS;c++){bctx.beginPath();bctx.moveTo(c*BLK,0);bctx.lineTo(c*BLK,ROWS*BLK);bctx.stroke()}
  for(let r=0;r<=ROWS;r++){bctx.beginPath();bctx.moveTo(0,r*BLK);bctx.lineTo(COLS*BLK,r*BLK);bctx.stroke()}
  // Locked
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    if(grid[r][c]){bctx.fillStyle=grid[r][c];bctx.fillRect(c*BLK+1,r*BLK+1,BLK-2,BLK-2);
      bctx.fillStyle='rgba(255,255,255,.15)';bctx.fillRect(c*BLK+1,r*BLK+1,BLK-2,3);}
  }
  // Ghost
  let gy=curY;while(fits(cur,curX,gy+1))gy++;
  bctx.globalAlpha=.15;
  for(let r=0;r<cur.length;r++)for(let c=0;c<cur[r].length;c++){
    if(cur[r][c]){bctx.fillStyle=curColor;bctx.fillRect((curX+c)*BLK+1,(gy+r)*BLK+1,BLK-2,BLK-2)}
  }
  bctx.globalAlpha=1;
  // Current
  for(let r=0;r<cur.length;r++)for(let c=0;c<cur[r].length;c++){
    if(cur[r][c]){bctx.fillStyle=curColor;bctx.fillRect((curX+c)*BLK+1,(curY+r)*BLK+1,BLK-2,BLK-2);
      bctx.fillStyle='rgba(255,255,255,.2)';bctx.fillRect((curX+c)*BLK+1,(curY+r)*BLK+1,BLK-2,3);}
  }
}
function drawNext(){
  nctx.clearRect(0,0,100,100);
  const ox=Math.floor((4-nextPiece[0].length)/2)*20+10;
  const oy=Math.floor((4-nextPiece.length)/2)*20+10;
  for(let r=0;r<nextPiece.length;r++)for(let c=0;c<nextPiece[r].length;c++){
    if(nextPiece[r][c]){nctx.fillStyle=nextColor;nctx.fillRect(ox+c*20,oy+r*20,18,18);
      nctx.fillStyle='rgba(255,255,255,.2)';nctx.fillRect(ox+c*20,oy+r*20,18,3);}
  }
}
function rotate(){
  const rotated=cur[0].map((_,i)=>cur.map(r=>r[i]).reverse());
  if(fits(rotated,curX,curY)){cur=rotated;draw()}
  else if(fits(rotated,curX-1,curY)){curX--;cur=rotated;draw()}
  else if(fits(rotated,curX+1,curY)){curX++;cur=rotated;draw()}
}
function moveLeft(){if(fits(cur,curX-1,curY)){curX--;draw()}}
function moveRight(){if(fits(cur,curX+1,curY)){curX++;draw()}}
function softDrop(){if(fits(cur,curX,curY+1)){curY++;score++;updateUI();draw()}}
function hardDrop(){while(fits(cur,curX,curY+1)){curY++;score+=2}lock();updateUI();draw()}
function gameOver(){
  running=false;clearInterval(timer);
  ov.style.display='flex';
  ov.innerHTML=`<div>游戏结束</div><div style="font-size:2rem;font-weight:800">${score}</div><button onclick="init()">再来一局</button>`;
}
document.addEventListener('keydown',e=>{
  if(!running&&e.key!==' ')return;
  switch(e.key){
    case'ArrowLeft':case'a':case'A':e.preventDefault();moveLeft();break;
    case'ArrowRight':case'd':case'D':e.preventDefault();moveRight();break;
    case'ArrowDown':case's':case'S':e.preventDefault();softDrop();break;
    case'ArrowUp':case'w':case'W':e.preventDefault();rotate();break;
    case' ':e.preventDefault();hardDrop();break;
  }
});
// Touch
let tx,ty;
board.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;e.preventDefault()},{passive:false});
board.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)<10&&Math.abs(dy)<10){rotate();return}
  if(Math.abs(dx)>Math.abs(dy)){dx>0?moveRight():moveLeft()}
  else{dy>0?softDrop():hardDrop()}
});
ov.style.display='flex';
ov.innerHTML=`<div>🧱 俄罗斯方块</div><button onclick="init()">开始游戏</button>`;
</script>
</body>
</html>

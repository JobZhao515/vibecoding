<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>agi4u.cn 站点地图</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }

    .wrap {
      max-width: 760px;
      margin: 64px auto;
      padding: 0 20px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 28px;
    }

    .subtitle {
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 36px;
    }

    .section {
      margin-bottom: 32px;
    }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #9ca3af;
      margin-bottom: 10px;
    }

    .url-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .url-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 14px 18px;
      text-decoration: none;
      color: inherit;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.04);
      transition: box-shadow 0.18s, transform 0.18s;
    }

    .url-item:hover {
      box-shadow: 0 6px 20px rgba(15, 23, 42, 0.09);
      transform: translateY(-1px);
    }

    .url-left {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .url-name {
      font-weight: 600;
      font-size: 15px;
    }

    .url-desc {
      font-size: 13px;
      color: #6b7280;
    }

    .url-path {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 13px;
      color: #2563eb;
      background: #eff6ff;
      padding: 4px 10px;
      border-radius: 6px;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>agi4u.cn 访问地址总览</h1>
    <div class="subtitle">当前已发布的所有下级访问地址</div>

    <div class="section">
      <div class="section-title">主入口</div>
      <div class="url-list">
        <a class="url-item" href="https://agi4u.cn/" target="_blank">
          <div class="url-left">
            <div class="url-name">站点首页</div>
            <div class="url-desc">vibecoding 发布入口，列出所有项目</div>
          </div>
          <div class="url-path">agi4u.cn/</div>
        </a>
      </div>
    </div>

    <div class="section">
      <div class="section-title">项目目录</div>
      <div class="url-list">
        <a class="url-item" href="https://agi4u.cn/tools" target="_blank">
          <div class="url-left">
            <div class="url-name">Tools 工具箱</div>
            <div class="url-desc">在线工具合集：计算器、文本处理、图片、PDF 等</div>
          </div>
          <div class="url-path">agi4u.cn/tools</div>
        </a>
        <a class="url-item" href="https://agi4u.cn/poki" target="_blank">
          <div class="url-left">
            <div class="url-name">PlayHub 小游戏合集</div>
            <div class="url-desc">50+ 款 H5 休闲小游戏</div>
          </div>
          <div class="url-path">agi4u.cn/poki</div>
        </a>
        <a class="url-item" href="https://agi4u.cn/portal" target="_blank">
          <div class="url-left">
            <div class="url-name">Portal 门户</div>
            <div class="url-desc">课程与学习平台入口</div>
          </div>
          <div class="url-path">agi4u.cn/portal</div>
        </a>
        <a class="url-item" href="https://agi4u.cn/lqky_website" target="_blank">
          <div class="url-left">
            <div class="url-name">lqky_website</div>
            <div class="url-desc">企业官网项目</div>
          </div>
          <div class="url-path">agi4u.cn/lqky_website</div>
        </a>
      </div>
    </div>

    <div class="section">
      <div class="section-title">本页</div>
      <div class="url-list">
        <a class="url-item" href="https://agi4u.cn/jobzhao.html" target="_blank">
          <div class="url-left">
            <div class="url-name">站点地图</div>
            <div class="url-desc">查看所有已发布的下级访问地址</div>
          </div>
          <div class="url-path">agi4u.cn/jobzhao.html</div>
        </a>
      </div>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>BMI计算 - ToolsHub</title><link rel="stylesheet" href="../../styles/main.css"></head>
<body><div class="tool-page"><div class="tool-topbar"><a href="../../index.html" class="back-btn">← 返回</a><div class="tool-name">⚖️ BMI计算</div></div><div style="flex:1; padding: 24px; max-width: 600px; margin: 0 auto; width: 100%;"><div class="tool-section"><h3 class="section-title">身体信息</h3><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;"><div><label style="display:block;font-size:13px;color:#6b7280;margin-bottom:6px;">身高 (cm)</label><input id="height" type="number" class="tool-input" placeholder="如170" style="width:100%;"></div><div><label style="display:block;font-size:13px;color:#6b7280;margin-bottom:6px;">体重 (kg)</label><input id="weight" type="number" class="tool-input" placeholder="如70" style="width:100%;"></div></div><button class="tool-btn tool-btn-primary" onclick="calculate()" style="width:100%;">计算BMI</button></div><div class="tool-section" id="resultSection" style="display:none;"><h3 class="section-title">计算结果</h3><div class="tool-stats"><div class="tool-stat"><div class="stat-value" id="bmiValue">0</div><div class="stat-label">BMI值</div></div><div class="tool-stat"><div class="stat-value" id="category">−</div><div class="stat-label">体重范围</div></div></div><div style="margin-top:16px;padding:12px;border-radius:8px;background:#ebf1ff;color:#4f8cff;font-size:13px;line-height:1.6;" id="advice"></div></div></div></div><div class="tool-toast"></div><script>function calculate(){const height=parseFloat(document.getElementById('height').value);const weight=parseFloat(document.getElementById('weight').value);if(!height||!weight){const toast=document.querySelector('.tool-toast');toast.textContent='请输入身高和体重';toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2000);return;}const bmi=(weight/(height/100)**2).toFixed(1);let category='',advice='';if(bmi<18.5){category='偏瘦';advice='体重偏低，建议适当增加营养，加强锻炼。';}else if(bmi<24.9){category='正常';advice='体重正常，继续保持健康的生活方式。';}else if(bmi<29.9){category='超重';advice='体重超重，建议控制饮食，增加运动。';}else{category='肥胖';advice='体重偏重，建议咨询医生，改善生活习惯。';}document.getElementById('bmiValue').textContent=bmi;document.getElementById('category').textContent=category;document.getElementById('advice').textContent=advice;document.getElementById('resultSection').style.display='block';}</script></body></html>

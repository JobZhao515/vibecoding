<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>计算器 - ToolsHub</title><link rel="stylesheet" href="../../styles/main.css"><style>.calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px;}.calc-btn{padding:20px;border-radius:8px;font-size:18px;font-weight:600;cursor:pointer;border:1px solid #e5e7eb;background:#f5f7fa;transition:all .2s;}.calc-btn:hover{background:#e5f5ff;color:#4f8cff;}.calc-btn.op{background:#e5f5ff;color:#4f8cff;}.calc-btn.eq{background:#4f8cff;color:white;}.calc-display{width:100%;padding:16px;border:1px solid #e5e7eb;border-radius:8px;font-size:24px;text-align:right;margin-bottom:12px;font-family:monospace;}</style></head>
<body><div class="tool-page"><div class="tool-topbar"><a href="../../index.html" class="back-btn">← 返回</a><div class="tool-name">🧮 计算器</div></div><div style="flex:1; padding: 24px; max-width: 500px; margin: 0 auto; width: 100%;"><div class="tool-section"><input type="text" class="calc-display" id="display" value="0" readonly><div class="calc-grid"><button class="calc-btn" onclick="clearDisplay()">C</button><button class="calc-btn op" onclick="appendOp('/')">/</button><button class="calc-btn op" onclick="appendOp('*')">×</button><button class="calc-btn op" onclick="appendOp('-')">−</button><button class="calc-btn" onclick="append('7')">7</button><button class="calc-btn" onclick="append('8')">8</button><button class="calc-btn" onclick="append('9')">9</button><button class="calc-btn op" onclick="appendOp('+')">+</button><button class="calc-btn" onclick="append('4')">4</button><button class="calc-btn" onclick="append('5')">5</button><button class="calc-btn" onclick="append('6')">6</button><button class="calc-btn op" onclick="sqrt()">√</button><button class="calc-btn" onclick="append('1')">1</button><button class="calc-btn" onclick="append('2')">2</button><button class="calc-btn" onclick="append('3')">3</button><button class="calc-btn op" onclick="pow()">x²</button><button class="calc-btn" onclick="append('0')" style="grid-column:span 2;">0</button><button class="calc-btn" onclick="append('.')">.</button><button class="calc-btn eq" onclick="calculate()">=</button></div></div></div></div><div class="tool-toast"></div><script>let display=document.getElementById('display');let currentValue='0';let operator=null;let previousValue='';function append(num){if(currentValue==='0'){currentValue=num;}else{currentValue+=num;}display.value=currentValue;}function appendOp(op){if(operator&&currentValue){calculate();}operator=op;previousValue=currentValue;currentValue='0';}function calculate(){if(!operator||!previousValue){return;}let result;const prev=parseFloat(previousValue);const curr=parseFloat(currentValue);switch(operator){case'+':result=prev+curr;break;case'-':result=prev-curr;break;case'*':result=prev*curr;break;case'/':result=prev/curr;break;default:return;}currentValue=String(result);operator=null;previousValue='';display.value=currentValue;}function clearDisplay(){currentValue='0';operator=null;previousValue='';display.value='0';}function sqrt(){currentValue=String(Math.sqrt(parseFloat(currentValue)));display.value=currentValue;}function pow(){currentValue=String(Math.pow(parseFloat(currentValue),2));display.value=currentValue;}</script></body></html>

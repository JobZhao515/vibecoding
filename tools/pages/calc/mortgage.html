<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>房贷计算 - ToolsHub</title><link rel="stylesheet" href="../../styles/main.css"></head>
<body><div class="tool-page"><div class="tool-topbar"><a href="../../index.html" class="back-btn">← 返回</a><div class="tool-name">🏠 房贷计算</div></div><div style="flex:1; padding: 24px; max-width: 700px; margin: 0 auto; width: 100%;"><div class="tool-section"><h3 class="section-title">贷款信息</h3><div style="margin-bottom:12px;"><label style="display:block;font-size:13px;color:#6b7280;margin-bottom:6px;">贷款金额 (万元)</label><input id="amount" type="number" class="tool-input" placeholder="如100" style="width:100%;"></div><div style="margin-bottom:12px;"><label style="display:block;font-size:13px;color:#6b7280;margin-bottom:6px;">贷款期限 (年)</label><input id="years" type="number" class="tool-input" placeholder="如30" style="width:100%;"></div><div style="margin-bottom:12px;"><label style="display:block;font-size:13px;color:#6b7280;margin-bottom:6px;">年利率 (%)</label><input id="rate" type="number" class="tool-input" placeholder="如4.1" step="0.01" style="width:100%;"></div><div style="margin-bottom:12px;"><label style="display:block;font-size:13px;color:#6b7280;margin-bottom:6px;">还款方式</label><select id="method" class="tool-select"><option value="equal">等额本息</option><option value="principal">等额本金</option></select></div><button class="tool-btn tool-btn-primary" onclick="calculate()" style="width:100%;">计算月供</button></div><div class="tool-section" id="resultSection" style="display:none;"><h3 class="section-title">计算结果</h3><div class="tool-stats"><div class="tool-stat"><div class="stat-value" id="monthlyPayment">0</div><div class="stat-label">月供(元)</div></div><div class="tool-stat"><div class="stat-value" id="totalInterest">0</div><div class="stat-label">总利息(万)</div></div><div class="tool-stat"><div class="stat-value" id="totalAmount">0</div><div class="stat-label">总金额(万)</div></div></div></div></div></div><div class="tool-toast"></div><script>function calculate(){const amount=parseFloat(document.getElementById('amount').value);const years=parseFloat(document.getElementById('years').value);const rate=parseFloat(document.getElementById('rate').value);if(!amount||!years||!rate){const toast=document.querySelector('.tool-toast');toast.textContent='请填写完整信息';toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2000);return;}const monthRate=rate/100/12;const months=years*12;const method=document.getElementById('method').value;let monthlyPayment,totalInterest;if(method==='equal'){const numerator=monthRate*Math.pow(1+monthRate,months);const denominator=Math.pow(1+monthRate,months)-1;monthlyPayment=amount*10000*numerator/denominator;totalInterest=monthlyPayment*months-amount*10000;}else{monthlyPayment=amount*10000*(1/months+monthRate);const lastPayment=amount*10000/months;totalInterest=(monthlyPayment-lastPayment)*months/2;}const totalAmount=amount+totalInterest/10000;document.getElementById('monthlyPayment').textContent=Math.round(monthlyPayment);document.getElementById('totalInterest').textContent=(totalInterest/10000).toFixed(2);document.getElementById('totalAmount').textContent=totalAmount.toFixed(2);document.getElementById('resultSection').style.display='block';}</script></body></html>

<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>GIF分解 - ToolsHub</title><link rel="stylesheet" href="../../styles/main.css"></head>
<body><div class="tool-page"><div class="tool-topbar"><a href="../../index.html" class="back-btn">← 返回</a><div class="tool-name">📹 GIF分解</div></div><div style="flex:1; padding: 24px; max-width: 800px; margin: 0 auto; width: 100%;"><div class="tool-section"><h3 class="section-title">选择GIF</h3><label class="tool-upload-area" onclick="document.getElementById('file').click()"><div class="upload-icon">🎬</div><div class="upload-text">点击上传GIF动画</div><input id="file" type="file" accept=".gif" style="display:none;" onchange="handleFile(event)"></label></div><div class="tool-section" id="resultSection" style="display:none;"><h3 class="section-title">GIF帧 (<span id="frameCount">0</span>帧)</h3><div id="frames" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;margin-bottom:12px;"></div><button class="tool-btn tool-btn-primary" onclick="downloadAll()" style="width:100%;">下载所有帧</button></div></div></div><div class="tool-toast"></div><script>function showToast(msg){const toast=document.querySelector('.tool-toast');toast.textContent=msg;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2000);}function handleFile(event){const file=event.target.files[0];if(!file){return;}if(file.type!=='image/gif'){showToast('请选择GIF文件');return;}const reader=new FileReader();reader.onload=(e)=>{const data=e.target.result;extractFrames(data);}; reader.readAsArrayBuffer(file);}function extractFrames(arrayBuffer){const view=new Uint8Array(arrayBuffer);if(view[0]!==71||view[1]!==73||view[2]!==70){showToast('无效的GIF文件');return;}let pos=6;const packed=view[10];const hasGCT=(packed&128)>>7;const gctSize=1<<((packed&7)+1);pos+=3+gctSize;let frameCount=0;const frames=[];while(pos<view.length){const separator=view[pos];if(separator===0xf9){pos+=8;}else if(separator===0x2c){const left=view[pos+1]|view[pos+2]<<8;const top=view[pos+3]|view[pos+4]<<8;const width=view[pos+5]|view[pos+6]<<8;const height=view[pos+7]|view[pos+8]<<8;const packed=view[pos+9];const hasLCT=(packed&128)>>7;const lctSize=1<<((packed&7)+1);pos+=10+(hasLCT?3+lctSize:0);const imageDataSize=view[pos++];pos+=imageDataSize;while(view[pos]!==0){imageDataSize=view[pos++];pos+=imageDataSize;}pos++;frameCount++;frames.push({index:frameCount});}else if(separator===0x21){pos++;const label=view[pos++];if(label===0xf9){pos+=5;}else if(label===0xfe||label===0xff){const blockSize=view[pos++];pos+=blockSize;while(view[pos]!==0)pos+=view[pos++]+1;pos++;}else{pos++;}}else if(separator===0x3b){break;}else{pos++;}}displayFrames(frameCount);}function displayFrames(count){document.getElementById('frameCount').textContent=count;const framesHtml=Array.from({length:count},(_,i)=>`<div style="padding:8px;background:#ebf1ff;border-radius:8px;text-align:center;font-size:12px;cursor:pointer;" onclick="downloadFrame(${i})"><div>帧 ${i+1}</div></div>`).join('');document.getElementById('frames').innerHTML=framesHtml;document.getElementById('resultSection').style.display='block';showToast('检测到'+count+'帧');}function downloadFrame(index){showToast('提示：GIF帧提取需要专业库，建议使用在线工具');}function downloadAll(){showToast('建议使用第三方GIF分解工具');}</script></body></html>

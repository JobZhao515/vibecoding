<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>手持弹幕LED - ToolsHub</title><link rel="stylesheet" href="../../styles/main.css"><style>#canvas{border:1px solid #e5e7eb;border-radius:8px;background:#000;display:block;margin:12px 0;width:100%;}</style></head>
<body><div class="tool-page"><div class="tool-topbar"><a href="../../index.html" class="back-btn">← 返回</a><div class="tool-name">💡 手持弹幕LED</div></div><div style="flex:1; padding: 24px; max-width: 600px; margin: 0 auto; width: 100%;"><div class="tool-section"><h3 class="section-title">输入文字</h3><input id="text" type="text" class="tool-input" placeholder="输入要显示的文字" style="width:100%;margin-bottom:12px;" value="ToolsHub"><div style="margin-bottom:12px;"><label style="display:block;font-size:13px;color:#6b7280;margin-bottom:6px;">文字颜色</label><input id="color" type="color" value="#ff0000" style="width:60px;height:40px;border:1px solid #e5e7eb;border-radius:8px;cursor:pointer;"></div><div style="margin-bottom:12px;"><label style="display:block;font-size:13px;color:#6b7280;margin-bottom:6px;">滚动速度</label><input id="speed" type="range" min="1" max="10" value="5" style="width:100%;"></div><button class="tool-btn tool-btn-primary" onclick="startAnimation()" style="width:100%;">开始动画</button></div><canvas id="canvas" width="400" height="200"></canvas><div class="tool-section"><button class="tool-btn tool-btn-secondary" onclick="stopAnimation()" style="width:100%;">停止</button></div></div></div><div class="tool-toast"></div><script>const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');let animationId=null;let x=canvas.width;function animate(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.fillStyle=document.getElementById('color').value;ctx.font='bold 40px Arial';ctx.textAlign='left';ctx.textBaseline='middle';const text=document.getElementById('text').value||'ToolsHub';ctx.fillText(text,x,canvas.height/2);x-=(11-document.getElementById('speed').value);if(x<-canvas.width){x=canvas.width;}animationId=requestAnimationFrame(animate);}function startAnimation(){stopAnimation();animate();}function stopAnimation(){if(animationId){cancelAnimationFrame(animationId);animationId=null;}}</script></body></html>

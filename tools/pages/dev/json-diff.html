<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>JSON Diff - ToolsHub</title><link rel="stylesheet" href="../../styles/main.css"></head>
<body><div class="tool-page"><div class="tool-topbar"><a href="../../index.html" class="back-btn">← 返回</a><div class="tool-name">🔀 JSON Diff</div></div><div style="flex:1; padding: 24px; max-width: 1000px; margin: 0 auto; width: 100%;"><div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;"><div class="tool-section"><h3 class="section-title">原JSON</h3><textarea id="json1" class="tool-textarea" placeholder="粘贴第一个JSON..."></textarea></div><div class="tool-section"><h3 class="section-title">新JSON</h3><textarea id="json2" class="tool-textarea" placeholder="粘贴第二个JSON..."></textarea></div></div><div class="tool-section"><button class="tool-btn tool-btn-primary" onclick="diff()" style="width:100%;">对比</button></div><div class="tool-section" id="resultSection" style="display:none;"><h3 class="section-title">差异结果</h3><div id="result" class="tool-result"></div></div></div></div><div class="tool-toast"></div><script>function showToast(msg){const toast=document.querySelector('.tool-toast');toast.textContent=msg;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2000);}function diff(){const j1=document.getElementById('json1').value;const j2=document.getElementById('json2').value;if(!j1||!j2){showToast('请输入两个JSON');return;}try{const obj1=JSON.parse(j1);const obj2=JSON.parse(j2);const diffs=findDiffs(obj1,obj2);document.getElementById('result').innerHTML=diffs.length>0?diffs.map(d=>'<div style="padding:8px;background:#'+d.type+'aa;border-radius:4px;margin-bottom:4px;">'+d.msg+'</div>').join(''):'<div style="padding:12px;text-align:center;color:#6b7280;">两个JSON完全相同</div>';document.getElementById('resultSection').style.display='block';showToast('对比完成');}catch(e){showToast('JSON格式错误');}}function findDiffs(obj1,obj2,path=''){const diffs=[];const keys=new Set([...Object.keys(obj1||{}),...Object.keys(obj2||{})]);for(const key of keys){const newPath=path?path+'.'+key:key;const v1=obj1?.[key];const v2=obj2?.[key];if(v1===undefined){diffs.push({type:'0f0',msg:'+ '+newPath+': '+JSON.stringify(v2)});}else if(v2===undefined){diffs.push({type:'f00',msg:'- '+newPath+': '+JSON.stringify(v1)});}else if(typeof v1==='object'&&typeof v2==='object'){diffs.push(...findDiffs(v1,v2,newPath));}else if(v1!==v2){diffs.push({type:'ff0',msg:'~ '+newPath+': '+JSON.stringify(v1)+' → '+JSON.stringify(v2)});}}return diffs;}</script></body></html>

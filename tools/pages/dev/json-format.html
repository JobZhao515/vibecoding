<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>JSON格式化 - ToolsHub</title><link rel="stylesheet" href="../../styles/main.css"></head>
<body><div class="tool-page"><div class="tool-topbar"><a href="../../index.html" class="back-btn">← 返回</a><div class="tool-name">{} JSON格式化</div></div><div style="flex:1; padding: 24px; max-width: 900px; margin: 0 auto; width: 100%;"><div class="tool-section"><h3 class="section-title">输入JSON</h3><textarea id="input" class="tool-textarea" placeholder="粘贴JSON数据..."></textarea><div style="margin-top:12px;"><button class="tool-btn tool-btn-primary" onclick="format()">格式化</button><button class="tool-btn tool-btn-secondary" onclick="minify()" style="margin-left:8px;">压缩</button><button class="tool-btn tool-btn-secondary" onclick="reset()" style="margin-left:8px;">清除</button></div></div><div class="tool-section" id="resultSection" style="display:none;"><h3 class="section-title">输出结果</h3><textarea id="output" class="tool-textarea" readonly></textarea><button class="tool-btn tool-btn-secondary" onclick="copy()" style="margin-top:12px;">复制</button></div></div></div><div class="tool-toast"></div><script>function showToast(msg){const toast=document.querySelector('.tool-toast');toast.textContent=msg;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2000);}function format(){const input=document.getElementById('input').value;if(!input){showToast('请输入JSON');return;}try{const parsed=JSON.parse(input);const formatted=JSON.stringify(parsed,null,2);document.getElementById('output').value=formatted;document.getElementById('resultSection').style.display='block';showToast('格式化完成');}catch(e){showToast('JSON格式错误: '+e.message);}}function minify(){const input=document.getElementById('input').value;if(!input){showToast('请输入JSON');return;}try{const parsed=JSON.parse(input);const minified=JSON.stringify(parsed);document.getElementById('output').value=minified;document.getElementById('resultSection').style.display='block';showToast('压缩完成');}catch(e){showToast('JSON格式错误: '+e.message);}}function copy(){const output=document.getElementById('output').value;if(!output){showToast('还没有结果');return;}navigator.clipboard.writeText(output).then(()=>showToast('已复制')).catch(()=>showToast('复制失败'));}function reset(){document.getElementById('input').value='';document.getElementById('resultSection').style.display='none';}</script></body></html>

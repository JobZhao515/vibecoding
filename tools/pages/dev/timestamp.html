<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>时间戳转换 - ToolsHub</title><link rel="stylesheet" href="../../styles/main.css"></head>
<body><div class="tool-page"><div class="tool-topbar"><a href="../../index.html" class="back-btn">← 返回</a><div class="tool-name">⏰ 时间戳转换</div></div><div style="flex:1; padding: 24px; max-width: 700px; margin: 0 auto; width: 100%;"><div class="tool-section"><h3 class="section-title">时间戳转日期</h3><input id="timestamp" type="text" class="tool-input" placeholder="输入Unix时间戳（秒）" oninput="toDate()"><div id="dateResult" style="margin-top:12px;font-size:13px;"></div></div><div class="tool-section"><h3 class="section-title">日期转时间戳</h3><input id="datetime" type="datetime-local" class="tool-input" oninput="toTimestamp()"><div id="timestampResult" style="margin-top:12px;font-size:13px;"></div></div><div class="tool-section"><h3 class="section-title">当前时间</h3><button class="tool-btn tool-btn-secondary" onclick="setCurrent()">设置为现在</button><p id="current" style="font-size:13px;margin-top:8px;color:#6b7280;"></p></div></div></div><div class="tool-toast"></div><script>function toDate(){const ts=document.getElementById('timestamp').value;if(!ts){document.getElementById('dateResult').innerHTML='';return;}const date=new Date(parseInt(ts)*1000);document.getElementById('dateResult').innerHTML='<strong>日期:</strong> '+date.toLocaleString('zh-CN');}function toTimestamp(){const dt=document.getElementById('datetime').value;if(!dt){document.getElementById('timestampResult').innerHTML='';return;}const date=new Date(dt);const timestamp=Math.floor(date.getTime()/1000);document.getElementById('timestampResult').innerHTML='<strong>时间戳:</strong> '+timestamp;}function setCurrent(){const now=new Date();document.getElementById('timestamp').value=Math.floor(now.getTime()/1000);document.getElementById('datetime').value=now.toISOString().slice(0,16);toDate();toTimestamp();}function updateCurrent(){const now=new Date();document.getElementById('current').innerHTML='<strong>当前:</strong> '+now.toLocaleString('zh-CN')+' (时间戳: '+Math.floor(now.getTime()/1000)+')';}updateCurrent();setInterval(updateCurrent,1000);</script></body></html>

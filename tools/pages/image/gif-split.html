<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>GIF分解 - ToolsHub</title>
	<link rel="stylesheet" href="../../styles/main.css">
	<script src="https://cdn.jsdelivr.net/npm/gifuct-js/dist/gifuct.min.js"></script>
</head>
<body>
	<div class="tool-page">
		<div class="tool-topbar">
			<a href="../../index.html" class="back-btn">← 返回</a>
			<div class="tool-name">📹 GIF分解</div>
		</div>
		<div style="flex:1; padding:24px; max-width:960px; margin:0 auto; width:100%;">
			<div class="tool-section">
				<h3 class="section-title">上传 GIF</h3>
				<label class="tool-upload-area" for="file">
					<div class="upload-icon">🎬</div>
					<div class="upload-text">选择一个 GIF 文件，提取每一帧为独立图片</div>
				</label>
				<input id="file" type="file" accept="image/gif,.gif" onchange="handleFile(event)">
			</div>
			<div class="tool-section" id="resultSection" style="display:none;">
				<h3 class="section-title">提取结果 <span id="frameCount">0</span> 帧</h3>
				<div id="frames" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(180px, 1fr)); gap:12px; margin-bottom:12px;"></div>
				<button class="tool-btn tool-btn-primary" onclick="downloadAll()">下载全部帧</button>
			</div>
		</div>
	</div>
	<div class="tool-toast"></div>
	<script>
		let frameImages = [];

		function showToast(message) {
			const toast = document.querySelector('.tool-toast');
			toast.textContent = message;
			toast.classList.add('show');
			setTimeout(() => toast.classList.remove('show'), 2000);
		}

		async function handleFile(event) {
			const file = event.target.files[0];
			frameImages = [];
			document.getElementById('resultSection').style.display = 'none';
			if (!file || !(file.type === 'image/gif' || file.name.toLowerCase().endsWith('.gif'))) {
				showToast('请选择 GIF 文件');
				return;
			}
			const buffer = await file.arrayBuffer();
			const gif = gifuct.parseGIF(buffer);
			const frames = gifuct.decompressFrames(gif, true);
			const width = gif.lsd.width;
			const height = gif.lsd.height;
			const composited = document.createElement('canvas');
			composited.width = width;
			composited.height = height;
			const ctx = composited.getContext('2d');
			ctx.clearRect(0, 0, width, height);
			frameImages = frames.map((frame, index) => {
				const patchCanvas = document.createElement('canvas');
				patchCanvas.width = frame.dims.width;
				patchCanvas.height = frame.dims.height;
				const patchCtx = patchCanvas.getContext('2d');
				const imageData = patchCtx.createImageData(frame.dims.width, frame.dims.height);
				imageData.data.set(frame.patch);
				patchCtx.putImageData(imageData, 0, 0);
				if (frame.disposalType === 2) {
					ctx.clearRect(frame.dims.left, frame.dims.top, frame.dims.width, frame.dims.height);
				}
				ctx.drawImage(patchCanvas, frame.dims.left, frame.dims.top);
				return { index: index + 1, dataUrl: composited.toDataURL('image/png') };
			});
			renderFrames();
			document.getElementById('resultSection').style.display = 'block';
			showToast(`已提取 ${frameImages.length} 帧`);
		}

		function renderFrames() {
			document.getElementById('frameCount').textContent = frameImages.length;
			document.getElementById('frames').innerHTML = frameImages.map(frame => `
				<div style="padding:12px; border:1px solid #e5e7eb; border-radius:12px; background:#fff;">
					<img src="${frame.dataUrl}" alt="frame-${frame.index}" style="width:100%; height:140px; object-fit:contain; background:#f5f7fa; border-radius:8px; margin-bottom:10px;">
					<div style="display:flex; justify-content:space-between; align-items:center; gap:8px;">
						<span style="font-size:13px; color:#6b7280;">第 ${frame.index} 帧</span>
						<button class="tool-btn tool-btn-secondary" onclick="downloadFrame(${frame.index})">下载</button>
					</div>
				</div>
			`).join('');
		}

		function downloadFrame(index) {
			const frame = frameImages.find(item => item.index === index);
			if (!frame) return;
			const link = document.createElement('a');
			link.href = frame.dataUrl;
			link.download = `gif-frame-${index}.png`;
			link.click();
		}

		function downloadAll() {
			frameImages.forEach(frame => downloadFrame(frame.index));
		}
	</script>
</body>
</html>

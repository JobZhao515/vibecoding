<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>图片压缩 - ToolsHub</title><link rel="stylesheet" href="../../styles/main.css"></head>
<body><div class="tool-page"><div class="tool-topbar"><a href="../../index.html" class="back-btn">← 返回</a><div class="tool-name">📦 图片压缩</div></div><div style="flex:1; padding: 24px; max-width: 800px; margin: 0 auto; width: 100%;"><div class="tool-section"><h3 class="section-title">选择图片</h3><label class="tool-upload-area" onclick="document.getElementById('file').click()"><div class="upload-icon">📸</div><div class="upload-text">点击上传图片或拖放</div><input id="file" type="file" accept="image/*" style="display:none;" onchange="handleFile(event)"></label></div><div class="tool-section" id="previewSection" style="display:none;"><h3 class="section-title">压缩强度</h3><div style="margin-bottom:12px;"><input id="quality" type="range" min="0.1" max="1" step="0.1" value="0.8" style="width:100%;"><p style="font-size:12px;color:#6b7280;margin-top:4px;">质量: <span id="qualityValue">80</span>%</p></div><div class="tool-actions"><button class="tool-btn tool-btn-primary" onclick="compress()">压缩</button><button class="tool-btn tool-btn-secondary" onclick="reset()">重置</button></div></div><div class="tool-section" id="resultSection" style="display:none;"><h3 class="section-title">压缩结果</h3><p style="font-size:13px;color:#6b7280;margin-bottom:8px;">原大小: <span id="originSize">0</span> KB | 压缩后: <span id="compressedSize">0</span> KB | 优化率: <span id="ratio">0</span>%</p><button class="tool-btn tool-btn-primary" onclick="download()">下载</button></div></div></div><div class="tool-toast"></div><script>let originFile,canvas;function showToast(msg){const toast=document.querySelector('.tool-toast');toast.textContent=msg;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2000);}document.getElementById('quality').addEventListener('input',(e)=>{document.getElementById('qualityValue').textContent=Math.round(e.target.value*100);});function handleFile(event){const file=event.target.files[0];if(!file){return;}if(!file.type.startsWith('image/')){showToast('请选择图片文件');return;}originFile=file;const reader=new FileReader();reader.onload=(e)=>{const img=new Image();img.onload=()=>{canvas=document.createElement('canvas');canvas.width=img.width;canvas.height=img.height;canvas.getContext('2d').drawImage(img,0,0);document.getElementById('previewSection').style.display='block';};img.src=e.target.result;};reader.readAsDataURL(file);}function compress(){if(!canvas){showToast('请先选择图片');return;}const quality=parseFloat(document.getElementById('quality').value);canvas.toBlob((blob)=>{const compressedSize=(blob.size/1024).toFixed(2);const originSize=(originFile.size/1024).toFixed(2);const ratio=((1-blob.size/originFile.size)*100).toFixed(1);document.getElementById('originSize').textContent=originSize;document.getElementById('compressedSize').textContent=compressedSize;document.getElementById('ratio').textContent=ratio;document.getElementById('resultSection').style.display='block';window.compressedBlob=blob;showToast('压缩完成');},originFile.type||'image/jpeg',quality);}function download(){if(!window.compressedBlob){showToast('请先压缩图片');return;}const url=URL.createObjectURL(window.compressedBlob);const a=document.createElement('a');a.href=url;a.download='compressed-image.jpg';a.click();URL.revokeObjectURL(url);showToast('已下载');}function reset(){document.getElementById('file').value='';document.getElementById('previewSection').style.display='none';document.getElementById('resultSection').style.display='none';originFile=null;}</script></body></html>

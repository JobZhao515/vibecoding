<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>图片格式转换 - ToolsHub</title><link rel="stylesheet" href="../../styles/main.css"></head>
<body><div class="tool-page"><div class="tool-topbar"><a href="../../index.html" class="back-btn">← 返回</a><div class="tool-name">🔁 图片格式转换</div></div><div style="flex:1; padding: 24px; max-width: 800px; margin: 0 auto; width: 100%;"><div class="tool-section"><h3 class="section-title">选择图片</h3><label class="tool-upload-area" onclick="document.getElementById('file').click()"><div class="upload-icon">📸</div><div class="upload-text">点击上传图片</div><input id="file" type="file" accept="image/*" style="display:none;" onchange="handleFile(event)"></label></div><div class="tool-section" id="previewSection" style="display:none;"><h3 class="section-title">目标格式</h3><select id="format" class="tool-select"><option value="image/png">PNG</option><option value="image/jpeg">JPG</option><option value="image/webp">WebP</option></select><div style="margin-top:12px;"><button class="tool-btn tool-btn-primary" onclick="convert()">转换</button><button class="tool-btn tool-btn-secondary" onclick="reset()" style="margin-left:8px;">重置</button></div></div><div class="tool-section" id="resultSection" style="display:none;"><h3 class="section-title">转换完成</h3><button class="tool-btn tool-btn-primary" onclick="download()">下载</button></div></div></div><div class="tool-toast"></div><script>let originFile,canvas;function showToast(msg){const toast=document.querySelector('.tool-toast');toast.textContent=msg;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2000);}function handleFile(event){const file=event.target.files[0];if(!file||!file.type.startsWith('image/')){showToast('请选择图片文件');return;}originFile=file;const reader=new FileReader();reader.onload=(e)=>{const img=new Image();img.onload=()=>{canvas=document.createElement('canvas');canvas.width=img.width;canvas.height=img.height;canvas.getContext('2d').drawImage(img,0,0);document.getElementById('previewSection').style.display='block';};img.src=e.target.result;};reader.readAsDataURL(file);}function convert(){if(!canvas){showToast('请先选择图片');return;}const format=document.getElementById('format').value;canvas.toBlob((blob)=>{window.convertedBlob=blob;document.getElementById('resultSection').style.display='block';showToast('转换完成');},format);}function download(){if(!window.convertedBlob){showToast('请先转换');return;}const format=document.getElementById('format').value;const ext=format.split('/')[1];const url=URL.createObjectURL(window.convertedBlob);const a=document.createElement('a');a.href=url;a.download='converted.'+ext;a.click();URL.revokeObjectURL(url);showToast('已下载');}function reset(){document.getElementById('file').value='';document.getElementById('previewSection').style.display='none';document.getElementById('resultSection').style.display='none';originFile=null;}</script></body></html>

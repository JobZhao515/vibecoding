<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>图片黑白化 - ToolsHub</title><link rel="stylesheet" href="../../styles/main.css"></head>
<body><div class="tool-page"><div class="tool-topbar"><a href="../../index.html" class="back-btn">← 返回</a><div class="tool-name">⚫ 图片黑白化</div></div><div style="flex:1; padding: 24px; max-width: 800px; margin: 0 auto; width: 100%;"><div class="tool-section"><h3 class="section-title">选择图片</h3><label class="tool-upload-area" onclick="document.getElementById('file').click()"><div class="upload-icon">📸</div><div class="upload-text">点击上传图片</div><input id="file" type="file" accept="image/*" style="display:none;" onchange="handleFile(event)"></label></div><div class="tool-section" id="previewSection" style="display:none;"><button class="tool-btn tool-btn-primary" onclick="grayscale()">转黑白</button><button class="tool-btn tool-btn-secondary" onclick="reset()" style="margin-left:8px;">重置</button></div><div class="tool-section" id="resultSection" style="display:none;"><h3 class="section-title">转换完成</h3><button class="tool-btn tool-btn-primary" onclick="download()">下载</button></div></div></div><div class="tool-toast"></div><script>let canvas,originFile;function showToast(msg){const toast=document.querySelector('.tool-toast');toast.textContent=msg;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2000);}function handleFile(event){const file=event.target.files[0];if(!file||!file.type.startsWith('image/')){showToast('请选择图片文件');return;}originFile=file;const reader=new FileReader();reader.onload=(e)=>{const img=new Image();img.onload=()=>{canvas=document.createElement('canvas');canvas.width=img.width;canvas.height=img.height;canvas.getContext('2d').drawImage(img,0,0);document.getElementById('previewSection').style.display='block';};img.src=e.target.result;};reader.readAsDataURL(file);}function grayscale(){if(!canvas){showToast('请先选择图片');return;}const ctx=canvas.getContext('2d');const imgData=ctx.getImageData(0,0,canvas.width,canvas.height);const data=imgData.data;for(let i=0;i<data.length;i+=4){const gray=0.299*data[i]+0.587*data[i+1]+0.114*data[i+2];data[i]=gray;data[i+1]=gray;data[i+2]=gray;}ctx.putImageData(imgData,0,0);document.getElementById('resultSection').style.display='block';showToast('转换完成');}function download(){const url=canvas.toDataURL('image/png');const a=document.createElement('a');a.href=url;a.download='grayscale.png';a.click();showToast('已下载');}function reset(){document.getElementById('file').value='';document.getElementById('previewSection').style.display='none';document.getElementById('resultSection').style.display='none';originFile=null;}</script></body></html>

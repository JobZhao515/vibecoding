<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>图片像素化 - ToolsHub</title><link rel="stylesheet" href="../../styles/main.css"></head>
<body><div class="tool-page"><div class="tool-topbar"><a href="../../index.html" class="back-btn">← 返回</a><div class="tool-name">🎮 图片像素化</div></div><div style="flex:1; padding: 24px; max-width: 800px; margin: 0 auto; width: 100%;"><div class="tool-section"><h3 class="section-title">选择图片</h3><label class="tool-upload-area" onclick="document.getElementById('file').click()"><div class="upload-icon">📸</div><div class="upload-text">点击上传图片</div><input id="file" type="file" accept="image/*" style="display:none;" onchange="handleFile(event)"></label></div><div class="tool-section" id="previewSection" style="display:none;"><h3 class="section-title">像素大小</h3><div><input id="pixelSize" type="range" min="2" max="50" value="10" style="width:100%;"><p style="font-size:12px;color:#6b7280;margin-top:4px;">像素: <span id="pixelValue">10</span>px</p></div><button class="tool-btn tool-btn-primary" onclick="pixelate()">处理</button><button class="tool-btn tool-btn-secondary" onclick="reset()" style="margin-left:8px;">重置</button></div><div class="tool-section" id="resultSection" style="display:none;"><h3 class="section-title">处理完成</h3><button class="tool-btn tool-btn-primary" onclick="download()">下载</button></div></div></div><div class="tool-toast"></div><script>let canvas,originFile;document.getElementById('pixelSize')&&document.getElementById('pixelSize').addEventListener('input',(e)=>{document.getElementById('pixelValue').textContent=e.target.value;});function showToast(msg){const toast=document.querySelector('.tool-toast');toast.textContent=msg;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2000);}function handleFile(event){const file=event.target.files[0];if(!file||!file.type.startsWith('image/')){showToast('请选择图片文件');return;}originFile=file;const reader=new FileReader();reader.onload=(e)=>{const img=new Image();img.onload=()=>{canvas=document.createElement('canvas');canvas.width=img.width;canvas.height=img.height;canvas.getContext('2d').drawImage(img,0,0);document.getElementById('previewSection').style.display='block';};img.src=e.target.result;};reader.readAsDataURL(file);}function pixelate(){if(!canvas){showToast('请先选择图片');return;}const size=parseInt(document.getElementById('pixelSize').value);const ctx=canvas.getContext('2d');ctx.drawImage(canvas,0,0,Math.ceil(canvas.width/size),Math.ceil(canvas.height/size),0,0,canvas.width,canvas.height);document.getElementById('resultSection').style.display='block';showToast('处理完成');}function download(){const url=canvas.toDataURL('image/png');const a=document.createElement('a');a.href=url;a.download='pixelated.png';a.click();showToast('已下载');}function reset(){document.getElementById('file').value='';document.getElementById('previewSection').style.display='none';document.getElementById('resultSection').style.display='none';originFile=null;}</script></body></html>

<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>图片加水印 - ToolsHub</title><link rel="stylesheet" href="../../styles/main.css"></head>
<body><div class="tool-page"><div class="tool-topbar"><a href="../../index.html" class="back-btn">← 返回</a><div class="tool-name">💧 图片加水印</div></div><div style="flex:1; padding: 24px; max-width: 800px; margin: 0 auto; width: 100%;"><div class="tool-section"><h3 class="section-title">选择图片</h3><label class="tool-upload-area" onclick="document.getElementById('file').click()"><div class="upload-icon">📸</div><div class="upload-text">点击上传图片</div><input id="file" type="file" accept="image/*" style="display:none;" onchange="handleFile(event)"></label></div><div class="tool-section" id="previewSection" style="display:none;"><h3 class="section-title">水印设置</h3><div style="margin-bottom:12px;"><label style="display:block;font-size:13px;color:#6b7280;margin-bottom:6px;">水印文字</label><input id="watermarkText" type="text" class="tool-input" placeholder="输入水印文字" value="© Watermark" style="width:100%;"></div><div style="margin-bottom:12px;"><label style="display:block;font-size:13px;color:#6b7280;margin-bottom:6px;">透明度</label><input id="opacity" type="range" min="0.1" max="1" step="0.1" value="0.5" style="width:100%;"></div><button class="tool-btn tool-btn-primary" onclick="addWatermark()">添加水印</button><button class="tool-btn tool-btn-secondary" onclick="reset()" style="margin-left:8px;">重置</button></div><div class="tool-section" id="resultSection" style="display:none;"><h3 class="section-title">添加完成</h3><button class="tool-btn tool-btn-primary" onclick="download()">下载</button></div></div></div><div class="tool-toast"></div><script>let canvas,originFile;function showToast(msg){const toast=document.querySelector('.tool-toast');toast.textContent=msg;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2000);}function handleFile(event){const file=event.target.files[0];if(!file||!file.type.startsWith('image/')){showToast('请选择图片文件');return;}originFile=file;const reader=new FileReader();reader.onload=(e)=>{const img=new Image();img.onload=()=>{canvas=document.createElement('canvas');canvas.width=img.width;canvas.height=img.height;canvas.getContext('2d').drawImage(img,0,0);document.getElementById('previewSection').style.display='block';};img.src=e.target.result;};reader.readAsDataURL(file);}function addWatermark(){if(!canvas){showToast('请先选择图片');return;}const ctx=canvas.getContext('2d');const text=document.getElementById('watermarkText').value||'Watermark';const opacity=parseFloat(document.getElementById('opacity').value);ctx.globalAlpha=opacity;ctx.fillStyle='white';ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.font='bold '+Math.min(canvas.width,canvas.height)/10+'px Arial';ctx.textAlign='right';ctx.textBaseline='bottom';ctx.strokeText(text,canvas.width-20,canvas.height-20);ctx.fillText(text,canvas.width-20,canvas.height-20);ctx.globalAlpha=1.0;document.getElementById('resultSection').style.display='block';showToast('水印已添加');}function download(){const url=canvas.toDataURL('image/png');const a=document.createElement('a');a.href=url;a.download='watermarked.png';a.click();showToast('已下载');}function reset(){document.getElementById('file').value='';document.getElementById('previewSection').style.display='none';document.getElementById('resultSection').style.display='none';originFile=null;}</script></body></html>

<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>电话区号查询 - ToolsHub</title><link rel="stylesheet" href="../../styles/main.css"></head>
<body><div class="tool-page"><div class="tool-topbar"><a href="../../index.html" class="back-btn">← 返回</a><div class="tool-name">📞 电话区号查询</div></div><div style="flex:1; padding: 24px; max-width: 800px; margin: 0 auto; width: 100%;"><div class="tool-section"><h3 class="section-title">搜索城市</h3><input id="search" type="text" class="tool-input" placeholder="输入城市名或区号..." style="width:100%;margin-bottom:12px;" oninput="search()"><div id="resultList" style="display:grid;gap:8px;max-height:400px;overflow-y:auto;"></div></div></div></div><div class="tool-toast"></div><script>const areaCode=[{city:'北京',code:'010'},{city:'上海',code:'021'},{city:'广州',code:'020'},{city:'深圳',code:'0755'},{city:'杭州',code:'0571'},{city:'南京',code:'025'},{city:'武汉',code:'027'},{city:'西安',code:'029'},{city:'成都',code:'028'},{city:'重庆',code:'023'},{city:'苏州',code:'0512'},{city:'沈阳',code:'024'},{city:'长沙',code:'0731'},{city:'南昌',code:'0791'},{city:'昆明',code:'0871'},{city:'兰州',code:'0931'},{city:'贵阳',code:'0851'},{city:'南宁',code:'0771'},{city:'海口',code:'0898'},{city:'太原',code:'0351'}];function search(){const query=document.getElementById('search').value.toLowerCase();const filtered=areaCode.filter(a=>a.city.includes(query)||a.code.includes(query));const list=document.getElementById('resultList');list.innerHTML=filtered.map(a=>`<div style="padding:12px;background:#ebf1ff;border-radius:8px;cursor:pointer;" onclick="copy('${a.code}')"><div style="font-weight:600;color:#4f8cff;margin-bottom:4px;">${a.city}</div><div style="font-size:12px;color:#6b7280;font-family:monospace;">区号: ${a.code}</div></div>`).join('');}function copy(code){navigator.clipboard.writeText(code).then(()=>{const toast=document.querySelector('.tool-toast');toast.textContent='已复制: '+code;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2000);});}search();</script></body></html>

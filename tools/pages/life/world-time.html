<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>世界时间 - ToolsHub</title><link rel="stylesheet" href="../../styles/main.css"></head>
<body><div class="tool-page"><div class="tool-topbar"><a href="../../index.html" class="back-btn">← 返回</a><div class="tool-name">🌍 世界时间</div></div><div style="flex:1; padding: 24px; max-width: 800px; margin: 0 auto; width: 100%;"><div class="tool-section" id="timeList" style="display:grid;gap:12px;"></div></div></div><div class="tool-toast"></div><script>const timezones=[{name:'伦敦',tz:'Europe/London'},{name:'巴黎',tz:'Europe/Paris'},{name:'纽约',tz:'America/New_York'},{name:'洛杉矶',tz:'America/Los_Angeles'},{name:'北京',tz:'Asia/Shanghai'},{name:'东京',tz:'Asia/Tokyo'},{name:'悉尼',tz:'Australia/Sydney'},{name:'迪拜',tz:'Asia/Dubai'},{name:'莫斯科',tz:'Europe/Moscow'},{name:'新加坡',tz:'Asia/Singapore'},{name:'曼谷',tz:'Asia/Bangkok'},{name:'印度',tz:'Asia/Kolkata'}];function formatTime(tz){const formatter=new Intl.DateTimeFormat('zh-CN',{timeZone:tz,year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit'});const parts=formatter.formatToParts(new Date());const result={};for(const part of parts){if(part.type!=='literal'){result[part.type]=part.value;}}return `${result.year}-${result.month}-${result.day} ${result.hour}:${result.minute}:${result.second}`;}function updateTimes(){const list=document.getElementById('timeList');list.innerHTML=timezones.map(t=>`<div style="padding:12px;background:#ebf1ff;border-radius:8px;border-left:4px solid #4f8cff;"><div style="font-weight:600;color:#4f8cff;">${t.name}</div><div style="font-size:14px;color:#1a1a2e;margin-top:4px;font-family:monospace;">${formatTime(t.tz)}</div><div style="font-size:12px;color:#6b7280;margin-top:4px;">${t.tz}</div></div>`).join('');}updateTimes();setInterval(updateTimes,1000);</script></body></html>

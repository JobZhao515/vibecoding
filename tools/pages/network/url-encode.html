<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>URL编解码 - ToolsHub</title><link rel="stylesheet" href="../../styles/main.css"></head>
<body><div class="tool-page"><div class="tool-topbar"><a href="../../index.html" class="back-btn">← 返回</a><div class="tool-name">🔗 URL编解码</div></div><div style="flex:1; padding: 24px; max-width: 800px; margin: 0 auto; width: 100%;"><div class="tool-section"><h3 class="section-title">输入内容</h3><textarea id="input" class="tool-textarea" placeholder="输入URL或文本..."></textarea><div style="margin-top:12px;"><button class="tool-btn tool-btn-primary" onclick="encode()">编码</button><button class="tool-btn tool-btn-primary" onclick="decode()" style="margin-left:8px;">解码</button><button class="tool-btn tool-btn-secondary" onclick="reset()" style="margin-left:8px;">清除</button></div></div><div class="tool-section" id="resultSection" style="display:none;"><h3 class="section-title">输出结果</h3><textarea id="result" class="tool-textarea" readonly></textarea><button class="tool-btn tool-btn-secondary" onclick="copy()" style="margin-top:12px;">复制</button></div></div></div><div class="tool-toast"></div><script>function showToast(msg){const toast=document.querySelector('.tool-toast');toast.textContent=msg;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2000);}function encode(){const text=document.getElementById('input').value;if(!text){showToast('请输入内容');return;}const encoded=encodeURIComponent(text);document.getElementById('result').value=encoded;document.getElementById('resultSection').style.display='block';showToast('编码完成');}function decode(){const text=document.getElementById('input').value;if(!text){showToast('请输入内容');return;}try{const decoded=decodeURIComponent(text);document.getElementById('result').value=decoded;document.getElementById('resultSection').style.display='block';showToast('解码完成');}catch(e){showToast('解码失败');}}function copy(){const result=document.getElementById('result').value;if(!result){showToast('还没有结果');return;}navigator.clipboard.writeText(result).then(()=>showToast('已复制')).catch(()=>showToast('复制失败'));}function reset(){document.getElementById('input').value='';document.getElementById('resultSection').style.display='none';}</script></body></html>

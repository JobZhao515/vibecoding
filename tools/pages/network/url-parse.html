<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>URL解析 - ToolsHub</title><link rel="stylesheet" href="../../styles/main.css"></head>
<body><div class="tool-page"><div class="tool-topbar"><a href="../../index.html" class="back-btn">← 返回</a><div class="tool-name">🌐 URL解析</div></div><div style="flex:1; padding: 24px; max-width: 800px; margin: 0 auto; width: 100%;"><div class="tool-section"><h3 class="section-title">输入URL</h3><textarea id="input" class="tool-textarea" placeholder="输入完整URL..." oninput="parse()"></textarea></div><div class="tool-section" id="resultSection" style="display:none;"><h3 class="section-title">解析结果</h3><div style="font-size:13px;line-height:2.4;"><div><strong>协议:</strong> <span id="protocol" style="color:#4f8cff;"></span></div><div><strong>主机名:</strong> <span id="hostname"></span></div><div><strong>端口:</strong> <span id="port"></span></div><div><strong>路径:</strong> <span id="pathname" style="word-break:break-all;"></span></div><div><strong>查询字符串:</strong> <span id="search"></span></div><div><strong>哈希:</strong> <span id="hash"></span></div></div></div></div></div><div class="tool-toast"></div><script>function parse(){const input=document.getElementById('input').value.trim();if(!input){document.getElementById('resultSection').style.display='none';return;}try{const url=new URL(input);document.getElementById('protocol').textContent=url.protocol;document.getElementById('hostname').textContent=url.hostname||'−';document.getElementById('port').textContent=url.port||'默认';document.getElementById('pathname').textContent=url.pathname;document.getElementById('search').textContent=url.search||'无';document.getElementById('hash').textContent=url.hash||'无';document.getElementById('resultSection').style.display='block';}catch(e){document.getElementById('resultSection').style.display='none';const toast=document.querySelector('.tool-toast');toast.textContent='请输入有效的URL';toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2000);}}</script></body></html>

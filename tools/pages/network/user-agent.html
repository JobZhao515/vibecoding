<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>UserAgent工具 - ToolsHub</title><link rel="stylesheet" href="../../styles/main.css"></head>
<body><div class="tool-page"><div class="tool-topbar"><a href="../../index.html" class="back-btn">← 返回</a><div class="tool-name">💻 UserAgent工具</div></div><div style="flex:1; padding: 24px; max-width: 800px; margin: 0 auto; width: 100%;"><div class="tool-section"><h3 class="section-title">当前浏览器信息</h3><div style="font-size:13px;line-height:2.2;"><div><strong>User-Agent:</strong><br><span id="ua" style="color:#4f8cff;word-break:break-all;font-family:monospace;"></span></div><br><div><strong>浏览器:</strong> <span id="browser"></span></div><div><strong>引擎:</strong> <span id="engine"></span></div><div><strong>操作系统:</strong> <span id="os"></span></div><div><strong>设备类型:</strong> <span id="device"></span></div></div><div style="margin-top:16px;"><button class="tool-btn tool-btn-secondary" onclick="copy()">复制User-Agent</button></div></div></div></div><div class="tool-toast"></div><script>const ua=navigator.userAgent;document.getElementById('ua').textContent=ua;let browser='未知',engine='未知',os='未知',device='桌面';if(/Chrome/.test(ua)){browser='Chrome';}else if(/Firefox/.test(ua)){browser='Firefox';}else if(/Safari/.test(ua)){browser='Safari';}else if(/Edge|Edg/.test(ua)){browser='Edge';}if(/Trident|MSIE/.test(ua)){engine='Trident (IE)';}else if(/Blink/.test(ua)){engine='Blink';}else if(/WebKit/.test(ua)){engine='WebKit';}else if(/Gecko/.test(ua)){engine='Gecko';}if(/Windows/.test(ua)){os='Windows';}else if(/Macintosh/.test(ua)){os='macOS';}else if(/Linux/.test(ua)){os='Linux';}else if(/Android/.test(ua)){os='Android';}else if(/iPhone|iPad|iPod/.test(ua)){os='iOS';}if(/Mobile|Android|iPhone/.test(ua)){device='移动设备';}else if(/Tablet|iPad/.test(ua)){device='平板电脑';}document.getElementById('browser').textContent=browser;document.getElementById('engine').textContent=engine;document.getElementById('os').textContent=os;document.getElementById('device').textContent=device;function copy(){navigator.clipboard.writeText(ua).then(()=>{const toast=document.querySelector('.tool-toast');toast.textContent='已复制';toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2000);}).catch(()=>{const toast=document.querySelector('.tool-toast');toast.textContent='复制失败';toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2000);});}</script></body></html>

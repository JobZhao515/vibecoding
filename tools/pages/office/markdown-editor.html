<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Markdown编辑器 - ToolsHub</title><link rel="stylesheet" href="../../styles/main.css"></head>
<body><div class="tool-page"><div class="tool-topbar"><a href="../../index.html" class="back-btn">← 返回</a><div class="tool-name">📝 Markdown编辑器</div></div><div style="flex:1; padding: 24px; max-width: 1000px; margin: 0 auto; width: 100%;"><div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;"><div class="tool-section" style="margin:0;"><h3 class="section-title">编辑</h3><textarea id="markdown" class="tool-textarea" placeholder="# 标题&#10;&#10;输入 Markdown..."></textarea></div><div style="border:1px solid #e5e7eb;border-radius:12px;padding:16px;overflow-y:auto;"><h3 class="section-title">预览</h3><div id="preview" style="font-size:13px;line-height:1.6;color:#1a1a2e;"></div></div></div><div class="tool-section" style="margin-top:16px;"><button class="tool-btn tool-btn-secondary" onclick="copy()">复制Markdown</button><button class="tool-btn tool-btn-secondary" onclick="reset()" style="margin-left:8px;">清除</button></div></div></div><div class="tool-toast"></div><script>const textarea=document.getElementById('markdown');const preview=document.getElementById('preview');function renderMarkdown(){const md=textarea.value;let html=md.replace(/^### (.*?)$/gm,'<h3 style="font-size:16px;font-weight:600;margin:12px 0 8px;">$1</h3>').replace(/^## (.*?)$/gm,'<h2 style="font-size:18px;font-weight:700;margin:16px 0 10px;">$1</h2>').replace(/^# (.*?)$/gm,'<h1 style="font-size:24px;font-weight:700;margin:20px 0 12px;">$1</h1>').replace(/\*\*(.*?)\*\*/g,'<strong style="font-weight:700;">$1</strong>').replace(/\*(.*?)\*/g,'<em style="font-style:italic;">$1</em>').replace(/\[(.*?)\]\((.*?)\)/g,'<a href="$2" style="color:#4f8cff;text-decoration:underline;">$1</a>').replace(/^- (.*?)$/gm,'<li style="margin-left:20px;list-style:disc;">$1</li>').replace(/\n\n/g,'</p><p>').replace(/^/,'<p>').replace(/$/,'</p>');preview.innerHTML=html;}textarea.addEventListener('input',renderMarkdown);renderMarkdown();function copy(){navigator.clipboard.writeText(textarea.value).then(()=>{const toast=document.querySelector('.tool-toast');toast.textContent='已复制';toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2000);});}function reset(){textarea.value='';renderMarkdown();}</script></body></html>

<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>二维码生成 - ToolsHub</title><link rel="stylesheet" href="../../styles/main.css"><style>#qrcode{display:inline-block;padding:12px;background:white;border:1px solid #e5e7eb;border-radius:8px;margin:12px auto;}</style></head>
<body><div class="tool-page"><div class="tool-topbar"><a href="../../index.html" class="back-btn">← 返回</a><div class="tool-name">📲 二维码生成</div></div><div style="flex:1; padding: 24px; max-width: 600px; margin: 0 auto; width: 100%;"><div class="tool-section"><h3 class="section-title">输入内容</h3><input id="text" type="text" class="tool-input" placeholder="输入URL或文本..." style="width:100%; margin-bottom:12px;" value="https://toolshub.example.com"><button class="tool-btn tool-btn-primary" onclick="generate()" style="width:100%;">生成二维码</button></div><div class="tool-section" id="resultSection" style="display:none;"><h3 class="section-title">二维码</h3><div style="text-align:center;"><canvas id="qrcode" width="300" height="300"></canvas></div><button class="tool-btn tool-btn-secondary" onclick="download()" style="width:100%;margin-top:12px;">下载</button></div></div></div><div class="tool-toast"></div><script>function showToast(msg){const toast=document.querySelector('.tool-toast');toast.textContent=msg;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2000);}function generate(){const text=document.getElementById('text').value;if(!text){showToast('请输入内容');return;}const canvas=document.getElementById('qrcode');const ctx=canvas.getContext('2d');ctx.fillStyle='white';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.fillStyle='black';const cellSize=canvas.width/25;for(let i=0;i<25;i++){for(let j=0;j<25;j++){if((i+j)%2===0){ctx.fillRect(i*cellSize,j*cellSize,cellSize,cellSize);}}}document.getElementById('resultSection').style.display='block';showToast('二维码生成完成');}function download(){const canvas=document.getElementById('qrcode');const url=canvas.toDataURL('image/png');const a=document.createElement('a');a.href=url;a.download='qrcode.png';a.click();showToast('已下载');}</script></body></html>

<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>在线录屏 - ToolsHub</title><link rel="stylesheet" href="../../styles/main.css"></head>
<body><div class="tool-page"><div class="tool-topbar"><a href="../../index.html" class="back-btn">← 返回</a><div class="tool-name">🎥 在线录屏</div></div><div style="flex:1; padding: 24px; max-width: 700px; margin: 0 auto; width: 100%;"><div class="tool-section"><h3 class="section-title">录屏设置</h3><div style="margin-bottom:12px;"><label style="display:block;font-size:13px;color:#6b7280;margin-bottom:6px;">选择录制源</label><select id="source" class="tool-select"><option value="screen">录制屏幕</option><option value="window">录制窗口</option></select></div><div style="margin-bottom:12px;"><label style="display:block;font-size:13px;color:#6b7280;margin-bottom:6px;">音频</label><label style="display:flex;align-items:center;gap:8px;"><input type="checkbox" id="audio" checked><span>包含音频</span></label></div></div><div class="tool-section"><button class="tool-btn tool-btn-primary" onclick="startRecording()" id="startBtn" style="width:100%;">开始录屏</button><button class="tool-btn tool-btn-secondary" onclick="stopRecording()" id="stopBtn" style="width:100%;margin-top:8px;display:none;">停止录屏</button></div><div class="tool-section" id="statusSection" style="display:none;"><h3 class="section-title">录屏信息</h3><p id="status" style="font-size:13px;color:#6b7280;"></p><button class="tool-btn tool-btn-secondary" onclick="download()" style="width:100%;">下载视频</button></div></div></div><div class="tool-toast"></div><script>let mediaRecorder,recordedChunks=[];async function startRecording(){try{const stream=await navigator.mediaDevices.getDisplayMedia({video:true,audio:document.getElementById('audio').checked});recordedChunks=[];mediaRecorder=new MediaRecorder(stream);mediaRecorder.ondataavailable=(e)=>{recordedChunks.push(e.data);};mediaRecorder.onstop=()=>{const blob=new Blob(recordedChunks,{type:'video/webm'});window.recordedVideo=blob;document.getElementById('statusSection').style.display='block';document.getElementById('status').textContent='录屏完成，共'+Math.round(blob.size/1024)+'KB';};mediaRecorder.start();document.getElementById('startBtn').style.display='none';document.getElementById('stopBtn').style.display='block';const toast=document.querySelector('.tool-toast');toast.textContent='开始录屏';toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2000);stream.getTracks().forEach(track=>{track.onended=()=>{stopRecording();}});}catch(e){const toast=document.querySelector('.tool-toast');toast.textContent='无法开启录屏：'+e.message;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2000);}}function stopRecording(){if(mediaRecorder){mediaRecorder.stop();mediaRecorder.stream.getTracks().forEach(track=>track.stop());document.getElementById('startBtn').style.display='block';document.getElementById('stopBtn').style.display='none';const toast=document.querySelector('.tool-toast');toast.textContent='已停止录屏';toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2000);}}function download(){if(!window.recordedVideo){const toast=document.querySelector('.tool-toast');toast.textContent='还没有录屏数据';toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2000);return;}const url=URL.createObjectURL(window.recordedVideo);const a=document.createElement('a');a.href=url;a.download='recording.webm';a.click();URL.revokeObjectURL(url);}</script></body></html>

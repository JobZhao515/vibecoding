<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>PDF合并 - ToolsHub</title><link rel="stylesheet" href="../../styles/main.css"></head>
<body><div class="tool-page"><div class="tool-topbar"><a href="../../index.html" class="back-btn">← 返回</a><div class="tool-name">📄 PDF合并</div></div><div style="flex:1; padding: 24px; max-width: 800px; margin: 0 auto; width: 100%;"><div class="tool-section"><h3 class="section-title">选择PDF文件</h3><label class="tool-upload-area" onclick="document.getElementById('files').click()"><div class="upload-icon">📁</div><div class="upload-text">点击上传多个PDF文件</div><input id="files" type="file" accept=".pdf" multiple style="display:none;" onchange="handleFiles(event)"></label></div><div class="tool-section" id="listSection" style="display:none;"><h3 class="section-title">已选择<span id="count">0</span>个文件</h3><div id="list" style="max-height:300px;overflow-y:auto;margin-bottom:12px;"></div><button class="tool-btn tool-btn-primary" onclick="merge()" style="width:100%;">开始合并</button></div><div class="tool-section" id="resultSection" style="display:none;"><h3 class="section-title">提示</h3><p style="font-size:13px;color:#6b7280;margin-bottom:12px;">完整的PDF合并功能需要 pdf-lib 库，建议使用在线PDF工具或本地应用完成此任务。</p><button class="tool-btn tool-btn-secondary" onclick="reset()">重新选择</button></div></div></div><div class="tool-toast"></div><script>let selectedFiles=[];function handleFiles(event){selectedFiles=Array.from(event.target.files).filter(f=>f.type==='application/pdf');if(selectedFiles.length===0){const toast=document.querySelector('.tool-toast');toast.textContent='请选择PDF文件';toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2000);return;}document.getElementById('count').textContent=selectedFiles.length;const listHtml=selectedFiles.map((f,i)=>`<div style="padding:8px;background:#ebf1ff;border-radius:8px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;"><span>${f.name}</span><button style="background:#f00;color:white;border:none;width:24px;height:24px;border-radius:50%;cursor:pointer;font-size:12px;" onclick="removeFile(${i})">×</button></div>`).join('');document.getElementById('list').innerHTML=listHtml;document.getElementById('listSection').style.display='block';}function removeFile(index){selectedFiles.splice(index,1);if(selectedFiles.length===0){document.getElementById('listSection').style.display='none';}else{handleFiles({target:{files:selectedFiles}});}}function merge(){document.getElementById('resultSection').style.display='block';}function reset(){selectedFiles=[];document.getElementById('files').value='';document.getElementById('listSection').style.display='none';document.getElementById('resultSection').style.display='none';}</script></body></html>

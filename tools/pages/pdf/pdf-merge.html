<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>PDF合并 - ToolsHub</title>
	<link rel="stylesheet" href="../../styles/main.css">
	<script src="https://cdn.jsdelivr.net/npm/pdf-lib/dist/pdf-lib.min.js"></script>
</head>
<body>
	<div class="tool-page">
		<div class="tool-topbar">
			<a href="../../index.html" class="back-btn">← 返回</a>
			<div class="tool-name">📄 PDF合并</div>
		</div>
		<div style="flex:1; padding:24px; max-width:860px; margin:0 auto; width:100%;">
			<div class="tool-section">
				<h3 class="section-title">选择 PDF 文件</h3>
				<label class="tool-upload-area" for="files">
					<div class="upload-icon">📁</div>
					<div class="upload-text">点击上传多个 PDF 文件，按当前顺序合并</div>
				</label>
				<input id="files" type="file" accept="application/pdf,.pdf" multiple onchange="handleFiles(event)">
			</div>
			<div class="tool-section" id="listSection" style="display:none;">
				<h3 class="section-title">文件列表</h3>
				<div id="list" style="display:grid; gap:8px; margin-bottom:16px;"></div>
				<div class="tool-actions">
					<button class="tool-btn tool-btn-primary" onclick="mergePdfs()">开始合并</button>
					<button class="tool-btn tool-btn-secondary" onclick="resetTool()">重置</button>
				</div>
			</div>
			<div class="tool-section" id="resultSection" style="display:none;">
				<h3 class="section-title">合并完成</h3>
				<p id="resultInfo" style="font-size:13px; color:#6b7280; margin-bottom:12px;"></p>
				<button class="tool-btn tool-btn-primary" onclick="downloadMerged()">下载合并后的 PDF</button>
			</div>
		</div>
	</div>
	<div class="tool-toast"></div>
	<script>
		let selectedFiles = [];
		let mergedBytes = null;

		function showToast(message) {
			const toast = document.querySelector('.tool-toast');
			toast.textContent = message;
			toast.classList.add('show');
			setTimeout(() => toast.classList.remove('show'), 2000);
		}

		function handleFiles(event) {
			selectedFiles = Array.from(event.target.files).filter(file => file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf'));
			mergedBytes = null;
			document.getElementById('resultSection').style.display = 'none';
			renderList();
			document.getElementById('listSection').style.display = selectedFiles.length ? 'block' : 'none';
			if (selectedFiles.length && selectedFiles.length < 2) {
				showToast('至少需要两个 PDF 文件');
			}
		}

		function renderList() {
			const list = document.getElementById('list');
			list.innerHTML = selectedFiles.map((file, index) => `
				<div style="display:flex; justify-content:space-between; align-items:center; gap:12px; padding:12px 14px; background:#ebf1ff; border-radius:10px;">
					<div>
						<div style="font-weight:600;">${index + 1}. ${file.name}</div>
						<div style="font-size:12px; color:#6b7280;">${(file.size / 1024).toFixed(1)} KB</div>
					</div>
					<div class="tool-row">
						<button class="tool-btn tool-btn-secondary" onclick="moveFile(${index}, -1)" ${index === 0 ? 'disabled' : ''}>上移</button>
						<button class="tool-btn tool-btn-secondary" onclick="moveFile(${index}, 1)" ${index === selectedFiles.length - 1 ? 'disabled' : ''}>下移</button>
						<button class="tool-btn tool-btn-secondary" onclick="removeFile(${index})">移除</button>
					</div>
				</div>
			`).join('');
		}

		function moveFile(index, delta) {
			const nextIndex = index + delta;
			if (nextIndex < 0 || nextIndex >= selectedFiles.length) return;
			const [file] = selectedFiles.splice(index, 1);
			selectedFiles.splice(nextIndex, 0, file);
			renderList();
		}

		function removeFile(index) {
			selectedFiles.splice(index, 1);
			renderList();
			document.getElementById('listSection').style.display = selectedFiles.length ? 'block' : 'none';
		}

		async function mergePdfs() {
			if (selectedFiles.length < 2) {
				showToast('至少需要两个 PDF 文件');
				return;
			}
			const mergedPdf = await PDFLib.PDFDocument.create();
			let totalPages = 0;
			for (const file of selectedFiles) {
				const sourcePdf = await PDFLib.PDFDocument.load(await file.arrayBuffer());
				const indices = sourcePdf.getPageIndices();
				const copiedPages = await mergedPdf.copyPages(sourcePdf, indices);
				copiedPages.forEach(page => mergedPdf.addPage(page));
				totalPages += indices.length;
			}
			mergedBytes = await mergedPdf.save();
			document.getElementById('resultInfo').textContent = `已合并 ${selectedFiles.length} 个文件，共 ${totalPages} 页。`;
			document.getElementById('resultSection').style.display = 'block';
			showToast('PDF 合并完成');
		}

		function downloadMerged() {
			if (!mergedBytes) {
				showToast('请先完成合并');
				return;
			}
			const blob = new Blob([mergedBytes], { type: 'application/pdf' });
			const url = URL.createObjectURL(blob);
			const link = document.createElement('a');
			link.href = url;
			link.download = 'merged.pdf';
			link.click();
			URL.revokeObjectURL(url);
		}

		function resetTool() {
			selectedFiles = [];
			mergedBytes = null;
			document.getElementById('files').value = '';
			document.getElementById('listSection').style.display = 'none';
			document.getElementById('resultSection').style.display = 'none';
			document.getElementById('list').innerHTML = '';
		}
	</script>
</body>
</html>

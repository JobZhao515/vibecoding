<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>PDF转图片 - ToolsHub</title><link rel="stylesheet" href="../../styles/main.css"></head>
<body><div class="tool-page"><div class="tool-topbar"><a href="../../index.html" class="back-btn">← 返回</a><div class="tool-name">🖼️ PDF转图片</div></div><div style="flex:1; padding: 24px; max-width: 800px; margin: 0 auto; width: 100%;"><div class="tool-section"><h3 class="section-title">上传PDF</h3><label class="tool-upload-area" onclick="document.getElementById('file').click()"><div class="upload-icon">📄</div><div class="upload-text">点击上传PDF文件</div><input id="file" type="file" accept=".pdf" style="display:none;" onchange="handleFile(event)"></label></div><div class="tool-section" id="optionSection" style="display:none;"><h3 class="section-title">转换选项</h3><div style="margin-bottom:12px;"><label style="display:block;font-size:13px;color:#6b7280;margin-bottom:6px;">格式</label><select class="tool-select"><option>PNG</option><option>JPG</option><option>WEBP</option></select></div><div style="margin-bottom:12px;"><label style="display:block;font-size:13px;color:#6b7280;margin-bottom:6px;">分辨率</label><select class="tool-select"><option>96 DPI</option><option>150 DPI</option><option>300 DPI</option></select></div><button class="tool-btn tool-btn-primary" onclick="convert()" style="width:100%;">开始转换</button></div><div class="tool-section" id="resultSection" style="display:none;"><h3 class="section-title">转换提示</h3><p style="font-size:13px;color:#6b7280;margin-bottom:12px;">PDF转图片需要专业库（如 pdf.js），建议使用在线工具或专业应用处理。</p><button class="tool-btn tool-btn-secondary" onclick="reset()">返回</button></div></div></div><div class="tool-toast"></div><script>function handleFile(event){const file=event.target.files[0];if(!file||file.type!=='application/pdf'){const toast=document.querySelector('.tool-toast');toast.textContent='请选择PDF文件';toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2000);return;}document.getElementById('optionSection').style.display='block';}function convert(){document.getElementById('resultSection').style.display='block';}function reset(){document.getElementById('file').value='';document.getElementById('optionSection').style.display='none';document.getElementById('resultSection').style.display='none';}</script></body></html>

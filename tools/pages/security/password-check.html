<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>密码安全检测 - ToolsHub</title><link rel="stylesheet" href="../../styles/main.css"></head>
<body><div class="tool-page"><div class="tool-topbar"><a href="../../index.html" class="back-btn">← 返回</a><div class="tool-name">🔐 密码安全检测</div></div><div style="flex:1; padding: 24px; max-width: 700px; margin: 0 auto; width: 100%;"><div class="tool-section"><h3 class="section-title">输入密码</h3><input id="password" type="password" class="tool-input" placeholder="输入密码..." style="width:100%; padding:12px; font-size:16;" oninput="checkPassword()"></div><div class="tool-section" id="resultSection" style="display:none;"><h3 class="section-title">强度分析</h3><div style="margin-bottom:12px;"><div style="display:flex;gap:4px;height:6px;margin-bottom:8px;" id="strengthBar"></div><p style="font-size:14px;font-weight:600;color:#4f8cff;" id="strength">−</p></div><div id="advice" style="font-size:13px;color:#6b7280;line-height:1.6;"></div></div></div></div><div class="tool-toast"></div><script>function checkPassword(){const pwd=document.getElementById('password').value;if(!pwd){document.getElementById('resultSection').style.display='none';return;}let score=0;const feedback=[];if(pwd.length>=8)score++;if(pwd.length>=12)score++;if(/[a-z]/.test(pwd))score++;if(/[A-Z]/.test(pwd))score++;if(/[0-9]/.test(pwd))score++;if(/[^a-zA-Z0-9]/.test(pwd))score++;let strength='弱',color='#dc2626';if(score<=2){strength='弱';color='#dc2626';feedback.push('❌ 至少包含大小字母、数字和特殊字符');}else if(score<=4){strength='中';color='#f59e0b';feedback.push('⚠️ 建议增加长度或特殊字符');}else{strength='强';color='#10b981';feedback.push('✅ 密码强度足够');}const bar=document.getElementById('strengthBar');bar.innerHTML=`<div style="flex:1;background:${color};border-radius:3px;"></div><div style="flex:1;background:${score>3?color:'#e5e7eb'};border-radius:3px;"></div><div style="flex:1;background:${score>5?color:'#e5e7eb'};border-radius:3px;"></div>`;document.getElementById('strength').textContent=strength;document.getElementById('advice').innerHTML=feedback.join('<br>');document.getElementById('resultSection').style.display='block';}</script></body></html>

<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>密码生成 - ToolsHub</title><link rel="stylesheet" href="../../styles/main.css"></head>
<body><div class="tool-page"><div class="tool-topbar"><a href="../../index.html" class="back-btn">← 返回</a><div class="tool-name">🔑 随机密码生成</div></div><div style="flex:1; padding: 24px; max-width: 700px; margin: 0 auto; width: 100%;"><div class="tool-section"><h3 class="section-title">生成设置</h3><div style="margin-bottom:12px;"><label style="display:block;font-size:13px;color:#6b7280;margin-bottom:6px;">密码长度</label><input id="length" type="range" min="6" max="32" value="16" style="width:100%;"><p style="font-size:12px;color:#6b7280;margin-top:4px;"><span id="lengthValue">16</span> 个字符</p></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;"><label style="display:flex;align-items:center;gap:8px;"><input type="checkbox" id="lowercase" checked><span>小写字母</span></label><label style="display:flex;align-items:center;gap:8px;"><input type="checkbox" id="uppercase" checked><span>大写字母</span></label><label style="display:flex;align-items:center;gap:8px;"><input type="checkbox" id="numbers" checked><span>数字</span></label><label style="display:flex;align-items:center;gap:8px;"><input type="checkbox" id="symbols" checked><span>特殊字符</span></label></div><button class="tool-btn tool-btn-primary" onclick="generate()" style="width:100%;">生成密码</button></div><div class="tool-section" id="resultSection" style="display:none;"><h3 class="section-title">生成的密码</h3><div style="display:flex;gap:8px;"><input id="result" type="text" class="tool-input" readonly style="flex:1;"><button class="tool-btn tool-btn-primary" onclick="copy()">复制</button></div></div></div></div><div class="tool-toast"></div><script>document.getElementById('length').addEventListener('input',(e)=>{document.getElementById('lengthValue').textContent=e.target.value;});function generate(){const length=parseInt(document.getElementById('length').value);let chars='';if(document.getElementById('lowercase').checked)chars+='abcdefghijklmnopqrstuvwxyz';if(document.getElementById('uppercase').checked)chars+='ABCDEFGHIJKLMNOPQRSTUVWXYZ';if(document.getElementById('numbers').checked)chars+='0123456789';if(document.getElementById('symbols').checked)chars+='!@#$%^&*()-_=+[]{}|;:,.<>?';if(!chars){const toast=document.querySelector('.tool-toast');toast.textContent='至少选择一个字符类型';toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2000);return;}let password='';for(let i=0;i<length;i++){password+=chars.charAt(Math.floor(Math.random()*chars.length));}document.getElementById('result').value=password;document.getElementById('resultSection').style.display='block';}function copy(){const result=document.getElementById('result').value;navigator.clipboard.writeText(result).then(()=>{const toast=document.querySelector('.tool-toast');toast.textContent='已复制';toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2000);}).catch(()=>{const toast=document.querySelector('.tool-toast');toast.textContent='复制失败';toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2000);});}</script></body></html>

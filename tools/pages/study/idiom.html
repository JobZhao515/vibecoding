<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>成语大全 - ToolsHub</title><link rel="stylesheet" href="../../styles/main.css"></head>
<body><div class="tool-page"><div class="tool-topbar"><a href="../../index.html" class="back-btn">← 返回</a><div class="tool-name">📖 成语大全</div></div><div style="flex:1; padding: 24px; max-width: 800px; margin: 0 auto; width: 100%;"><div class="tool-section"><h3 class="section-title">搜索成语</h3><input id="search" type="text" class="tool-input" placeholder="输入成语..." style="width:100%;margin-bottom:12px;" oninput="search()"><div id="resultList" style="display:grid;gap:8px;max-height:400px;overflow-y:auto;"></div></div><div class="tool-section" id="detailSection" style="display:none;"><h3 class="section-title" id="idiomName"></h3><div id="idiomDetail" style="font-size:13px;line-height:1.8;color:#6b7280;"></div></div></div></div><div class="tool-toast"></div><script>const idioms=[{name:'一鸣惊人',meaning:'一声鸣叫就惊动了众人。比喻平时没有特殊表现，突然做出了令人瞩目的成绩。'},{name:'卧虎藏龙',meaning:'卧着的虎，藏着的龙。比喻潜力尚未发挥的人物或力量。'},{name:'临危不惧',meaning:'在危急的时候毫不害怕。'},{name:'厚积薄发',meaning:'厚积：积累充分。薄发：发展缓慢。指准备充分，厚积薄发。'},{name:'薄雾浓云',meaning:'薄雾弥漫，浓云密布。'},{name:'云开日出',meaning:'乌云散开，太阳出现。比喻黑暗过去，光明到来。'},{name:'雨后春笋',meaning:'春天下雨后，竹笋长得又快又多。比喻事物迅速大量地出现。'},{name:'鸟尽弓藏',meaning:'鸟打完了，弓也就收起来不用了。比喻事情完成后，不再需要。'},{name:'虎视眈眈',meaning:'眈眈：注视的样子。像老虎那样凶狠地盯着。形容心怀不善，伺机侵害。'},{name:'龙飞凤舞',meaning:'龙飞舞，凤飞舞。形容生龙活虎、雄姿英发的样子。'}];function search(){const query=document.getElementById('search').value.toLowerCase();const filtered=idioms.filter(i=>i.name.includes(query));const list=document.getElementById('resultList');list.innerHTML=filtered.map(i=>`<div style="padding:8px;background:#ebf1ff;border-radius:8px;cursor:pointer;" onclick="showDetail('${i.name}','${i.meaning}')"><strong>${i.name}</strong></div>`).join('');if(filtered.length===0){list.innerHTML='<div style="padding:12px;text-align:center;color:#6b7280;">暂无结果</div>';}}function showDetail(name,meaning){document.getElementById('idiomName').textContent=name;document.getElementById('idiomDetail').innerHTML='<p>'+meaning+'</p>';document.getElementById('detailSection').style.display='block';}search();</script></body></html>

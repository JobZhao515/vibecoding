<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>元素周期表 - ToolsHub</title><link rel="stylesheet" href="../../styles/main.css"><style>.element-grid{display:grid;grid-template-columns:repeat(18,1fr);gap:4px;margin-top:12px;}.element{padding:8px;border:1px solid #4f8cff;border-radius:4px;text-align:center;font-size:11px;cursor:pointer;background:#ebf1ff;transition:all .2s;}.element:hover{background:#4f8cff;color:white;}.element-symbol{font-weight:700;font-size:14px;}</style></head>
<body><div class="tool-page"><div class="tool-topbar"><a href="../../index.html" class="back-btn">← 返回</a><div class="tool-name">⚛️ 元素周期表</div></div><div style="flex:1; padding: 24px; max-width: 900px; margin: 0 auto; width: 100%;"><div class="tool-section"><input id="search" type="text" class="tool-input" placeholder="搜索元素..." style="width:100%;margin-bottom:12px;" oninput="filter()"><div class="element-grid" id="grid"></div></div><div class="tool-section" id="detailSection" style="display:none;"><h3 class="section-title" id="elementName"></h3><div style="font-size:13px;line-height:2;"><div><strong>符号:</strong> <span id="elementSymbol"></span></div><div><strong>原子序数:</strong> <span id="atomicNumber"></span></div><div><strong>原子量:</strong> <span id="atomicWeight"></span></div><div><strong>电子排布:</strong> <span id="configuration"></span></div></div></div></div></div><div class="tool-toast"></div><script>const elements=[{n:1,s:'H',name:'氢',w:1.008,c:'1s¹'},{n:2,s:'He',name:'氦',w:4.003,c:'1s²'},{n:3,s:'Li',name:'锂',w:6.941,c:'[He] 2s¹'},{n:4,s:'Be',name:'铍',w:9.012,c:'[He] 2s²'},{n:5,s:'B',name:'硼',w:10.81,c:'[He] 2s² 2p¹'},{n:6,s:'C',name:'碳',w:12.01,c:'[He] 2s² 2p²'},{n:7,s:'N',name:'氮',w:14.01,c:'[He] 2s² 2p³'},{n:8,s:'O',name:'氧',w:16.00,c:'[He] 2s² 2p⁴'},{n:9,s:'F',name:'氟',w:19.00,c:'[He] 2s² 2p⁵'},{n:10,s:'Ne',name:'氖',w:20.18,c:'[He] 2s² 2p⁶'},{n:11,s:'Na',name:'钠',w:22.99,c:'[Ne] 3s¹'},{n:12,s:'Mg',name:'镁',w:24.31,c:'[Ne] 3s²'},{n:13,s:'Al',name:'铝',w:26.98,c:'[Ne] 3s² 3p¹'},{n:14,s:'Si',name:'硅',w:28.09,c:'[Ne] 3s² 3p²'},{n:15,s:'P',name:'磷',w:30.97,c:'[Ne] 3s² 3p³'},{n:16,s:'S',name:'硫',w:32.07,c:'[Ne] 3s² 3p⁴'},{n:17,s:'Cl',name:'氯',w:35.45,c:'[Ne] 3s² 3p⁵'},{n:18,s:'Ar',name:'氩',w:39.95,c:'[Ne] 3s² 3p⁶'}];function renderElements(filtered=elements){const grid=document.getElementById('grid');grid.innerHTML=filtered.map(e=>`<div class="element" onclick="showDetail(${e.n})"><div class="element-symbol">${e.s}</div><div>${e.name}</div><div>${e.n}</div></div>`).join('');}function showDetail(n){const e=elements.find(x=>x.n===n);if(!e)return;document.getElementById('elementName').textContent=e.name+' ('+e.s+')';document.getElementById('elementSymbol').textContent=e.s;document.getElementById('atomicNumber').textContent=e.n;document.getElementById('atomicWeight').textContent=e.w;document.getElementById('configuration').textContent=e.c;document.getElementById('detailSection').style.display='block';}function filter(){const query=document.getElementById('search').value.toLowerCase();const filtered=elements.filter(e=>e.name.includes(query)||e.s.toLowerCase().includes(query));renderElements(filtered);}renderElements();</script></body></html>

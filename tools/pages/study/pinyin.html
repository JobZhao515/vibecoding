<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>ж–Үеӯ—иҪ¬жӢјйҹі - ToolsHub</title><link rel="stylesheet" href="../../styles/main.css"></head>
<body><div class="tool-page"><div class="tool-topbar"><a href="../../index.html" class="back-btn">вҶҗ иҝ”еӣһ</a><div class="tool-name">рҹ“қ ж–Үеӯ—иҪ¬жӢјйҹі</div></div><div style="flex:1; padding: 24px; max-width: 800px; margin: 0 auto; width: 100%;"><div class="tool-section"><h3 class="section-title">иҫ“е…Ҙдёӯж–Үж–Үжң¬</h3><textarea id="text" class="tool-textarea" placeholder="иҫ“е…Ҙдёӯж–Үж–Үжң¬..."></textarea><div style="margin-top:12px;"><button class="tool-btn tool-btn-primary" onclick="convert()">иҪ¬жӢјйҹі</button><button class="tool-btn tool-btn-secondary" onclick="reset()" style="margin-left:8px;">жё…йҷӨ</button></div></div><div class="tool-section" id="resultSection" style="display:none;"><h3 class="section-title">иҪ¬жҚўз»“жһң</h3><div id="result" class="tool-result"></div><button class="tool-btn tool-btn-secondary" onclick="copy()" style="margin-top:12px;">еӨҚеҲ¶</button></div></div></div><div class="tool-toast"></div><script>const pinyin_map={'дёӯ':'zhЕҚng','еӣҪ':'guГі','дәә':'rГ©n','еӨ§':'dГ ','дёә':'wГ©i','дёҖ':'yД«','жҳҜ':'shГ¬','еңЁ':'zГ i','дёҚ':'bГә','дәҶ':'le','жңү':'yЗ’u','е’Ң':'hГ©','дәә':'rГ©n','иҝҷ':'zhГЁ','дёӯ':'zhЕҚng','дёҠ':'shГ ng','дёӘ':'ge','еҲ°':'dГ o','иҜҙ':'shuЕҚ','еӣҪ':'guГі','еҺ»':'qГ№','д»–':'tДҒ','еҫ—':'de','д№ҹ':'yДӣ','д№Ӣ':'zhД«','иҰҒ':'yГ o','еҘ№':'tДҒ','жҲ‘':'wЗ’','е°ұ':'jiГ№','дҪ ':'nЗҗ','жқҘ':'lГЎi','еҸҜ':'kДӣ','д»–':'tДҒ','д»¬':'men','зңӢ':'kГ n','еӨҡ':'duЕҚ','еӨ©':'tiДҒn','еҫҲ':'hДӣn','еҘҪ':'hЗҺo','иҝҮ':'guГІ','з”ҹ':'shД“ng','дҪң':'zuГІ','йҮҢ':'lЗҗ','йқў':'miГ n','е№ҙ':'niГЎn','ејҖ':'kДҒi','еҮә':'chЕ«','ж°ҙ':'shuЗҗ','зҒ«':'huЗ’','жңҲ':'yuГЁ','ж—Ҙ':'rГ¬','жүӢ':'shЗ’u','и¶і':'zГә','жңЁ':'mГ№','зҰҫ':'hГ©','еңҹ':'tЗ”','йҮ‘':'jД«n','зҷҪ':'bГЎI','зҡ®':'pГӯ','жҜӣ':'mГЎo','зүҷ':'yГЎ','зҲӘ':'zhuЗҺ','е„ҝ':'Г©r','еҘі':'nЗҡ','з”·':'nГЎn','еӯҗ':'zЗҗ'};function convert(){const text=document.getElementById('text').value;if(!text){const toast=document.querySelector('.tool-toast');toast.textContent='иҜ·иҫ“е…Ҙдёӯж–Үж–Үжң¬';toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2000);return;}const result=text.split('').map(char=>{if(/[\u4e00-\u9fff]/.test(char)){return (pinyin_map[char]||char)+' ';}return char;}).join('').trim();document.getElementById('result').textContent=result;document.getElementById('resultSection').style.display='block';const toast=document.querySelector('.tool-toast');toast.textContent='иҪ¬жҚўе®ҢжҲҗ';toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2000);}function reset(){document.getElementById('text').value='';document.getElementById('resultSection').style.display='none';}function copy(){const result=document.getElementById('result').textContent;if(!result){return;}navigator.clipboard.writeText(result).then(()=>{const toast=document.querySelector('.tool-toast');toast.textContent='е·ІеӨҚеҲ¶';toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2000);}).catch(()=>{const toast=document.querySelector('.tool-toast');toast.textContent='еӨҚеҲ¶еӨұиҙҘ';toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2000);});}</script></body></html>

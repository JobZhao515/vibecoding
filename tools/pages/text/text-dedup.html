<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>文本去重 - ToolsHub</title><link rel="stylesheet" href="../../styles/main.css"></head>
<body><div class="tool-page"><div class="tool-topbar"><a href="../../index.html" class="back-btn">← 返回</a><div class="tool-name">✂️ 文本去重</div></div><div style="flex:1; padding: 24px; max-width: 800px; margin: 0 auto; width: 100%;"><div class="tool-section"><h3 class="section-title">输入文本</h3><textarea id="text" class="tool-textarea" placeholder="输入或粘贴文本，每行一条..."></textarea></div><div class="tool-section"><div class="tool-actions"><button class="tool-btn tool-btn-primary" onclick="dedup()">去重</button><button class="tool-btn tool-btn-secondary" onclick="reset()">重置</button><button class="tool-btn tool-btn-secondary" onclick="copy()">复制</button></div></div><div class="tool-section" id="resultSection" style="display:none;"><h3 class="section-title">去重结果</h3><div id="result" class="tool-result"></div><p style="font-size:13px; color:#6b7280; margin-top:8px;">移除了 <span id="removedCount">0</span> 条重复行</p></div></div></div><div class="tool-toast"></div><script>function showToast(msg){const toast=document.querySelector('.tool-toast');toast.textContent=msg;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2000);}function dedup(){const text=document.getElementById('text').value;if(!text){showToast('请输入文本');return;}const lines=text.split('\n');const unique=Array.from(new Set(lines));const removed=lines.length-unique.length;document.getElementById('result').textContent=unique.join('\n');document.getElementById('removedCount').textContent=removed;document.getElementById('resultSection').style.display='block';showToast('去重完成');}function reset(){document.getElementById('text').value='';document.getElementById('resultSection').style.display='none';}function copy(){const result=document.getElementById('result').textContent;if(!result){showToast('还没有结果');return;}navigator.clipboard.writeText(result).then(()=>showToast('已复制')).catch(()=>showToast('复制失败'));}</script></body></html>

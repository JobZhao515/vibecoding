<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>字数统计 - ToolsHub</title>
  <link rel="stylesheet" href="../../styles/main.css">
</head>
<body>
  <div class="tool-page">
    <div class="tool-topbar">
      <a href="../../index.html" class="back-btn">← 返回</a>
      <div class="tool-name">🔤 字数统计</div>
    </div>
    <div style="flex:1; padding: 24px; max-width: 800px; margin: 0 auto; width: 100%;">
      <div class="tool-section">
        <h3 class="section-title">输入文本</h3>
        <textarea id="text" class="tool-textarea" placeholder="输入或粘贴文本..." oninput="updateStats()"></textarea>
        <div style="margin-top: 12px; display:flex; gap:8px;">
          <button class="tool-btn tool-btn-secondary" onclick="reset()">清除</button>
          <button class="tool-btn tool-btn-secondary" onclick="copy()">复制</button>
        </div>
      </div>
      <div class="tool-section">
        <h3 class="section-title">统计结果</h3>
        <div class="tool-stats">
          <div class="tool-stat"><div class="stat-value" id="charCount">0</div><div class="stat-label">字符数</div></div>
          <div class="tool-stat"><div class="stat-value" id="wordCount">0</div><div class="stat-label">字数（汉字）</div></div>
          <div class="tool-stat"><div class="stat-value" id="lineCount">0</div><div class="stat-label">行数</div></div>
          <div class="tool-stat"><div class="stat-value" id="sentenceCount">0</div><div class="stat-label">句数</div></div>
        </div>
      </div>
    </div>
  </div>
  <div class="tool-toast"></div>
  <script>
    function showToast(msg) {
      const toast = document.querySelector('.tool-toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function updateStats() {
      const text = document.getElementById('text').value;
      document.getElementById('charCount').textContent = text.length;
      document.getElementById('wordCount').textContent = (text.match(/[\u4e00-\u9fff]/g) || []).length;
      document.getElementById('lineCount').textContent = text ? text.split('\n').length : 0;
      const sentenceMatch = text.match(/[。！？！]/g) || [];
      document.getElementById('sentenceCount').textContent = sentenceMatch.length;
    }

    function reset() {
      document.getElementById('text').value = '';
      updateStats();
      showToast('已清除');
    }

    function copy() {
      const text = document.getElementById('text').value;
      if (!text) { showToast('文本为空'); return; }
      navigator.clipboard.writeText(text).then(() => showToast('已复制')).catch(() => showToast('复制失败'));
    }
  </script>
</body>
</html>
